      - pattern: "supernova*"
        versions: ["*"]
      - pattern: "ivc*"
        versions: ["*"]
    sources:
      - "Nova Paper (CRYPTO 2022)"
      - "Recursive SNARK Security Research"
    description: |
      Base case verification in IVC (Incrementally Verifiable Computation) can be
      bypassed by providing a fake accumulator state that claims to be the base case.
      
      IMPACT:
      - Invalid initial state propagates through recursion
      - Complete proof forgery possible
      - All subsequent proofs built on forged base are invalid

    detection:
      oracle: recursive_base_case
      attack_type: soundness
      procedure:
        - action: create_fake_base_accumulator
        - action: skip_base_verification
        - action: continue_recursion
          expected: should_fail

    regression_test:
      enabled: true
      circuit_path: "cat5_recursive/nova-ivc"
      test_cases:
        - name: valid_base_case
          inputs:
            start_from_base: true
          expected_result: valid_ivc_proof
        - name: skipped_base_case
          inputs:
            start_from_step: 5
            fake_accumulator: true
          expected_result: invalid_ivc_proof
      assertion: "IVC must enforce base case verification"

    remediation:
      description: "Verify base case commitment matches expected initial state"
      code_example: |
        // In Nova verifier
        if is_base_case {
            assert!(accumulator == AccumulatorState::default());
            assert!(step_index == 0);
        }

