oracle_configs:
  nullifier_collision:
    max_observations: 100000
    collision_threshold: 0
    entropy_check: true
    min_entropy: 0.9

  merkle_soundness:
    expected_depth: 20
    test_truncation: true
    test_extension: true
    test_non_binary_indices: true

  signature_malleability:
