# Detection oracle configurations
oracle_configs:
  nullifier_collision:
    max_observations: 100000
    collision_threshold: 0
    entropy_check: true
    min_entropy: 0.9

  merkle_soundness:
    expected_depth: 20
    test_truncation: true
    test_extension: true
    test_non_binary_indices: true

  signature_malleability:
    test_negation: true
    field_order: "0x30644e72e131a029b85045b68181585d2833e84879b9709143e1f593f0000001"

  range_overflow:
    bit_widths: [8, 16, 32, 64, 128, 254]
    test_boundary_plus_one: true
    test_field_max: true
