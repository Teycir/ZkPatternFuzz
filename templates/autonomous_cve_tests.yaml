  # Iden3 Circomlib - MontgomeryAdd Underconstrained
  - id: "ZK-CVE-AUTO-015"
    name: "MontgomeryAdd Points Underconstrained"
    severity: critical
    cvss_score: 9.0
    affected_circuits:
      - pattern: "iden3/circomlib/montgomery"
        versions: ["*"]
    sources:
      - "Veridise Audit"
      - "zkBugs Dataset"
    description: |
      MontgomeryAdd template has underconstrained points similar to MontgomeryDouble. 
      Malicious prover can provide different points that satisfy constraints but 
      produce incorrect addition results.
      
    detection:
      oracle: underconstrained
      attack_type: underconstrained
      procedure:
        - action: test_montgomery_add
        - action: verify_addition_correctness

    remediation:
      description: "Add constraints to ensure proper point addition"
      code_example: |
        // Constrain output points properly
        outX <== (lambda * lambda) - in1X - in2X;
        outY <== lambda * (in1X - outX) - in1Y;

    regression_test:
      enabled: true
      circuit_path: "targets/zkbugs/dataset/circom/iden3/circomlib/veridise_underconstrained_points_in_montgomeryAdd/circuits/circuit.circom"
      test_cases:
        - name: valid_point_add
          inputs:
            point1: [1, 2]
            point2: [3, 4]
          expected_result: valid_proof
        - name: bogus_addition
          inputs:
            point1: [1, 2]
            point2: [3, 4]
            forced_result: [99, 99]
          expected_result: invalid_proof
      assertion: "Point addition must be mathematically correct"

