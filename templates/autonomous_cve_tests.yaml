  # Self.xyz - Fake Non-Inclusion Proof
  - id: "ZK-CVE-AUTO-018"
    name: "Fake Non-Inclusion Proof via SMT Aliasing Bug"
    severity: critical
    cvss_score: 9.3
    affected_circuits:
      - pattern: "selfxyz/self"
        versions: ["*"]
    sources:
      - "zkSecurity Audit"
      - "zkBugs Dataset"
    description: |
      An attacker can craft a fake non-inclusion proof for a given key due to an 
      aliasing bug in the SMT (Sparse Merkle Tree) verifier. This allows proving 
      that a key doesn't exist when it actually does.
      
    detection:
      oracle: soundness
      attack_type: soundness
      procedure:
        - action: test_inclusion_proof
        - action: test_non_inclusion_proof
        - action: verify_smt_correctness

    remediation:
      description: "Fix aliasing bug in SMT path verification"
      code_example: |
        // Ensure proper path validation
        component pathVerifier = SMTPathVerifier();
        pathVerifier.key <== key;
        pathVerifier.path <== path;
        pathVerifier.out === 1;

    regression_test:
      enabled: true
      circuit_path: "targets/zkbugs/dataset/circom/selfxyz/self/zksecurity_an_attacker_can_craft_a_fake_non_inclusion_proof_for_a_given_key_due_to_an_aliasing_bug_in_the_smt_verifier/circuits/circuit.circom"
      test_cases:
        - name: valid_non_inclusion
          inputs:
            key: "0x1234"
            siblings: [...]
          expected_result: valid_proof
        - name: fake_non_inclusion
          inputs:
            key: "0x1234"
            malicious_siblings: [...]
          expected_result: invalid_proof
      assertion: "Non-inclusion proofs must be sound"

  # Tangle Network - Incorrect Initialization
  - id: "ZK-CVE-AUTO-019"
    name: "Incorrect Initialization in Membership Circuits"
    severity: high
    cvss_score: 8.1
    affected_circuits:
      - pattern: "tangle-network/protocol-solidity"
        versions: ["*"]
    sources:
      - "Veridise Audit"
      - "zkBugs Dataset"
    description: |
      Membership circuits have incorrect initialization leading to underconstrained 
      state. This can allow unauthorized membership claims or bypass membership 
      verification entirely.
      
    detection:
      oracle: underconstrained
      attack_type: underconstrained
      procedure:
        - action: test_initialization
        - action: verify_membership_state

    remediation:
      description: "Properly initialize all state variables"
      code_example: |
        // Initialize state properly
        signal initialState;
        initialState <== 0;
        state[0] <== initialState;

    regression_test:
      enabled: true
      circuit_path: "targets/zkbugs/dataset/circom/tangle-network/protocol-solidity/veridise_incorrect_initialization_in_membership_circuits/circuits/circuit.circom"
      test_cases:
        - name: valid_membership
          inputs:
