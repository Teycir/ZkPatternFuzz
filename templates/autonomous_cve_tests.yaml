        - action: verify_preimage_resistance

    remediation:
      description: "Use proper domain separation and padding"
      recommendations:
        - "Add domain separation tags"
        - "Use length-prefixed encoding"

    regression_test:
      enabled: true
      circuit_path: "targets/zkbugs/dataset/circom/selfxyz/self/zksecurity_second_pre_image_attacks_on_packbytesandposeidon_may_be_used_to_register_arbitrary_passports_and_dsc_certificates/circuits/circuit.circom"
      test_cases:
        - name: unique_hash
          inputs:
