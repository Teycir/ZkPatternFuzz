  # Self.xyz - Second Preimage Attack on PackBytes
  - id: "ZK-CVE-AUTO-017"
    name: "Second Preimage Attack on PackBytesAndPoseidon"
    severity: critical
    cvss_score: 9.5
    affected_circuits:
      - pattern: "selfxyz/self"
        versions: ["*"]
    sources:
      - "zkSecurity Audit"
      - "zkBugs Dataset"
    description: |
      Second preimage attacks on PackBytes and Poseidon can be used to register 
      arbitrary passports and DSC certificates. This allows attackers to create 
      fraudulent identity attestations.
      
    detection:
      oracle: collision
