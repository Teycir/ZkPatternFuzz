            merkleRoot: "0xabcd"
          expected_result: valid_proof
        - name: uninitialized_state
          inputs:
            member: "0x1234"
            skip_init: true
          expected_result: invalid_proof
      assertion: "Circuits must be properly initialized"

  # CVE-2024-42459 - EdDSA Signature Malleability (Real CVE)
  - id: "CVE-2024-42459"
    name: "EdDSA Signature Malleability in Elliptic"
    severity: critical
    cvss_score: 9.8
    affected_circuits:
      - pattern: "*eddsa*"
        versions: ["*"]
      - pattern: "*elliptic*"
        versions: ["<6.5.5"]
    sources:
      - "CVE-2024-42459"
      - "SentinelOne Disclosure"
    description: |
      CVE-2024-42459 is an EdDSA signature malleability vulnerability caused by 
      missing signature length validation. Signatures can be modified without 
      invalidating them, allowing transaction replay and malleability attacks.
      
      Technical Details:
      - Missing signature length validation
      - Both (R, s) and (R, -s mod q) verify successfully
      - No canonical signature form enforcement
      
    detection:
      oracle: malleability
      attack_type: malleability
      procedure:
        - action: generate_valid_signature
        - action: negate_s_component
        - action: verify_both_signatures
        - action: check_canonical_form

    remediation:
      description: "Enforce canonical signature form s < q/2"
      code_example: |
        // Verify signature length
        assert(sig.length == 64);
        
        // Enforce canonical form
        component lt = LessThan(254);
        lt.in[0] <== s;
        lt.in[1] <== q / 2;
        lt.out === 1;

    regression_test:
      enabled: true
      circuit_path: "targets/zkbugs/dataset/circom/iden3/circomlib/kobi_gurkan_mimc_hash_assigned_but_not_constrained/circuits/circuit.circom"
      test_cases:
        - name: canonical_signature
          inputs:
            R: "0x1234567890abcdef"
            s: "0x1234567890abcdef"
          expected_result: valid_proof
        - name: malleable_signature
          inputs:
            R: "0x1234567890abcdef"
            s_negated: "0xedcba09876543210"
          expected_result: invalid_proof
      assertion: "Only canonical signatures must be valid"

  # SuccinctLabs - Incorrect Point Doubling Handling
  - id: "ZK-CVE-AUTO-020"
    name: "Incorrect Point Doubling Allows Signature Forgery"
    severity: critical
    cvss_score: 9.7
    affected_circuits:
      - pattern: "succinctlabs/telepathy-circuits"
        versions: ["*"]
    sources:
      - "Trail of Bits Audit"
      - "zkBugs Dataset"
    description: |
      Incorrect handling of point doubling in BLS signature verification can allow 
      signature forgery. When the same point is added to itself, the circuit doesn't 
      handle the degenerate case correctly.
      
    detection:
      oracle: soundness
      attack_type: soundness
      procedure:
        - action: test_point_doubling
        - action: verify_signature_validity
        - action: attempt_forgery

    remediation:
      description: "Handle point doubling edge cases"
      code_example: |
        // Check for point doubling
        component isSameX = IsEqual();
        isSameX.in[0] <== P1.x;
        isSameX.in[1] <== P2.x;
        
        // Handle separately if same point
        component doubler = ECPointDouble();
        doubler.in <== P1;

    regression_test:
      enabled: true
      circuit_path: "targets/zkbugs/dataset/circom/succinctlabs/telepathy-circuits/trailofbits_incorrect_handling_of_point_doubling_can_allow_signature_forgery/circuits/circuit.circom"
      test_cases:
        - name: valid_point_add
          inputs:
            P1: [1, 2]
            P2: [3, 4]
          expected_result: valid_proof
        - name: point_doubling_edge
          inputs:
            P1: [1, 2]
            P2: [1, 2]
          expected_result: valid_proof
        - name: forged_signature
          inputs:
            signature: [0, 0]
            message: "0x1234"
          expected_result: invalid_proof
      assertion: "Point operations must handle all edge cases"

  # SuccinctLabs - Zero Padding Overflow in SHA256
  - id: "ZK-CVE-AUTO-021"
    name: "SHA256 Zero Padding Vulnerable to Overflow"
    severity: high
    cvss_score: 8.4
    affected_circuits:
      - pattern: "succinctlabs/telepathy-circuits"
        versions: ["*"]
    sources:
      - "Veridise Audit"
      - "zkBugs Dataset"
    description: |
      Zero padding for SHA256 in ExpandMessageXMD is vulnerable to overflow. 
      Insufficient range checks allow padded values to exceed expected bounds, 
      potentially leading to incorrect hash outputs.
      
    detection:
      oracle: boundary
      attack_type: boundary
      procedure:
        - action: test_padding_bounds
        - action: verify_overflow_protection
        - action: check_sha256_correctness

    remediation:
      description: "Add range checks to padded values"
      code_example: |
        // Constrain padded values
        component padCheck = Num2Bits(8);
        padCheck.in <== paddedByte;
        
        // Verify padding is correct
        paddedByte * (paddedByte - 0x80) === 0;

    regression_test:
      enabled: true
      circuit_path: "targets/zkbugs/dataset/circom/succinctlabs/telepathy-circuits/veridise_zero_padding_for_sha256_in_ExpandMessageXMD_is_vulnerable_to_an_overflow/circuits/circuit.circom"
      test_cases:
        - name: valid_padding
          inputs:
            message: "0x1234"
            pad_length: 10
          expected_result: valid_proof
        - name: overflow_padding
          inputs:
            message: "0x1234"
            pad_length: 999999
          expected_result: invalid_proof
      assertion: "Padding must be within bounds"

  # SuccinctLabs - Non-Reduced Y Values in G1BigInt
  - id: "ZK-CVE-AUTO-022"
    name: "Non-Reduced Y Values Allow Fund Locking"
    severity: high
    cvss_score: 8.6
    affected_circuits:
      - pattern: "succinctlabs/telepathy-circuits"
        versions: ["*"]
    sources:
      - "Trail of Bits Audit"
      - "zkBugs Dataset"
    description: |
      Prover can lock user funds by supplying non-reduced Y values to G1BigIntToSignFlag. 
      Insufficient validation of Y coordinate allows malicious provers to create 
      proofs that cannot be verified on-chain.
      
    detection:
      oracle: boundary
      attack_type: boundary
      procedure:
        - action: test_y_value_range
        - action: verify_reduction
        - action: check_verifiability

    remediation:
      description: "Enforce Y value reduction modulo field"
      code_example: |
        // Reduce Y modulo field
        component yMod = BigMod();
        yMod.a <== y;
        yMod.b <== fieldModulus;
        yMod.out <== yReduced;

    regression_test:
      enabled: true
      circuit_path: "targets/zkbugs/dataset/circom/succinctlabs/telepathy-circuits/trailofbits_prover_can_lock_user_funds_by_supplying_non-reduced_Y_values_to_G1BigIntToSignFlag/circuits/circuit.circom"
      test_cases:
        - name: reduced_y_value
          inputs:
            point: [1, 2]
          expected_result: valid_proof
        - name: non_reduced_y
          inputs:
            point: [1, "0x30644e72e131a029b85045b68181585d2833e84879b9709143e1f593f0000002"]
          expected_result: invalid_proof
      assertion: "Y values must be field-reduced"
