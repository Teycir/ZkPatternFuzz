# AI-Generated Merkle Tree Audit Template
# 
# This template is used by Claude Opus to generate optimized fuzzing campaigns
# for Merkle tree circuits. Variables like {{CIRCUIT_PATH}} are filled in by
# the AI based on circuit analysis.
#
# Usage:
#   1. Upload your circuit to Claude
#   2. Use the prompt in docs/CLAUDE_PROMPT.md
#   3. Claude fills in the variables and returns complete YAML
---
campaign:
  name: "AI-Generated Merkle Tree Audit"
  version: "2.0"
  target:
    framework: "{{FRAMEWORK}}"  # circom, noir, halo2
    circuit_path: "{{CIRCUIT_PATH}}"
    main_component: "{{MAIN_COMPONENT}}"

  parameters:
    field: "{{FIELD_PRIME}}"  # bn254, bls12-381
    max_constraints: 100000
    timeout_seconds: 600

# Include standard Merkle trait template
includes:
  - "templates/traits/base.yaml"
  - "templates/traits/merkle.yaml"
  - "templates/traits/hash.yaml"

# Profile configuration (filled by AI)
profiles:
  detected:
    max_depth: "{{MAX_DEPTH}}"  # e.g., 20, 32
    hash_function: "{{HASH_FUNCTION}}"  # poseidon, mimc, pedersen
    bit_length: 254

active_profile: "detected"

# Target traits detected by AI
target_traits:
  uses_merkle: true
  hash_function: "{{HASH_FUNCTION}}"
  range_checks: ["bitlen:254"]
  # Additional traits detected:
  # {{ADDITIONAL_TRAITS}}

# Invariants (some auto-generated, some from template)
invariants:
  - name: "merkle_path_binary"
    invariant_type: constraint
    relation: "∀i: pathIndices[i] ∈ {0,1}"
    oracle: must_hold
    severity: "critical"
    description: "All path indices must be 0 or 1"

  - name: "merkle_root_consistency"
    invariant_type: constraint
    relation: "computedRoot == expectedRoot"
    oracle: must_hold
    severity: "critical"
    description: "Computed root must match public input"

  - name: "path_element_range"
    invariant_type: range
    relation: "∀i: 0 <= pathElements[i] < p"
    oracle: constraint_check
    severity: "high"
    description: "Path elements must be valid field elements"

# Phased attack schedule
schedule:
  - phase: "exploration"
    duration_sec: 60
    attacks: ["underconstrained", "boundary"]
    early_terminate:
      on_critical_findings: 3
    carry_corpus: true

  - phase: "merkle_specific"
    duration_sec: 180
    attacks: ["collision", "constraint_inference"]
    carry_corpus: true

  - phase: "deep_testing"
    duration_sec: 360
    attacks: ["soundness", "arithmetic_overflow", "metamorphic"]
    carry_corpus: true

# Attacks configuration
attacks:
  - type: "underconstrained"
    description: "Check for missing Merkle path constraints"
    config:
      witness_pairs: 2000
      focus_on:
        - "pathIndices"
        - "pathElements"

  - type: "collision"
    description: "Test for Merkle root collisions"
    config:
      samples: 50000
      target_output: "root"

  - type: "boundary"
    description: "Test depth and index boundaries"
    config:
      test_values:
        - "0"
        - "1"
        - "{{MAX_DEPTH}}"
        - "{{MAX_DEPTH}}+1"
        - "2^{{MAX_DEPTH}}-1"

  - type: "arithmetic_overflow"
    description: "Test field arithmetic edge cases"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "(p-1)/2"

  - type: "constraint_inference"
    description: "Detect missing constraints via pattern analysis"
    config:
      categories:
        - "merkle_path"
        - "bit_decomposition"
      confidence_threshold: 0.7

# Inputs (filled by AI based on circuit analysis)
inputs:
  - name: "{{ROOT_INPUT_NAME}}"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "{{LEAF_INPUT_NAME}}"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x0"
      - "0x1"
      - "0xdeadbeef"

  - name: "{{PATH_ELEMENTS_NAME}}"
    type: "array<field>"
    length: "{{MAX_DEPTH}}"
    fuzz_strategy: "mutation"

  - name: "{{PATH_INDICES_NAME}}"
    type: "array<bool>"
    length: "{{MAX_DEPTH}}"
    fuzz_strategy: "boundary"
    interesting:
      - "0"
      - "1"
      - "2"  # Should trigger bug if not binary constrained

# Mutations specific to Merkle trees
mutations:
  - name: "flip_path_index"
    probability: 0.3
    operations: ["bit_flip"]

  - name: "swap_path_elements"
    probability: 0.2
    operations: ["swap_adjacent"]

  - name: "duplicate_values"
    probability: 0.15
    operations: ["copy_input"]

# Reporting configuration
reporting:
  output_dir: "./reports/{{CIRCUIT_NAME}}"
  formats: ["json", "markdown", "sarif"]
  include_poc: true
  crash_reproduction: true
