# AI-Generated Nullifier Circuit Audit Template
#
# For circuits implementing nullifier patterns (e.g., Tornado Cash, Semaphore)
# Variables are filled by Claude based on circuit analysis.
---
campaign:
  name: "AI-Generated Nullifier Audit"
  version: "2.0"
  target:
    framework: "{{FRAMEWORK}}"
    circuit_path: "{{CIRCUIT_PATH}}"
    main_component: "{{MAIN_COMPONENT}}"

  parameters:
    field: "{{FIELD_PRIME}}"
    max_constraints: 100000
    timeout_seconds: 600

includes:
  - "templates/traits/base.yaml"
  - "templates/traits/nullifier.yaml"
  - "templates/traits/hash.yaml"

profiles:
  detected:
    hash_function: "{{HASH_FUNCTION}}"
    bit_length: 254

active_profile: "detected"

target_traits:
  uses_nullifier: true
  uses_commitment: true
  hash_function: "{{HASH_FUNCTION}}"

invariants:
  - name: "nullifier_uniqueness"
    invariant_type: uniqueness
    relation: "∀(secret1, secret2): secret1 != secret2 => nullifier(secret1) != nullifier(secret2)"
    oracle: must_hold
    severity: "critical"
    description: "Different secrets must produce different nullifiers"

  - name: "nullifier_binding"
    invariant_type: constraint
    relation: "nullifier == hash(secret, pathIndex)"
    oracle: must_hold
    severity: "critical"
    description: "Nullifier must be correctly computed from secret"

  - name: "commitment_hiding"
    invariant_type: constraint
    relation: "commitment == hash(secret, nullifier)"
    oracle: constraint_check
    severity: "high"
    description: "Commitment should hide the secret"

schedule:
  - phase: "exploration"
    duration_sec: 60
    attacks: ["underconstrained", "boundary"]
    carry_corpus: true

  - phase: "nullifier_specific"
    duration_sec: 240
    attacks: ["collision", "witness_collision"]
    early_terminate:
      on_critical_findings: 1
    carry_corpus: true

  - phase: "deep_testing"
    duration_sec: 300
    attacks: ["soundness", "spec_inference"]
    carry_corpus: true

attacks:
  - type: "underconstrained"
    description: "Check for missing nullifier constraints"
    config:
      witness_pairs: 2000

  - type: "collision"
    description: "Test for nullifier collisions"
    config:
      samples: 100000
      target_output: "nullifierHash"

  - type: "witness_collision"
    description: "Find distinct witnesses with same nullifier"
    config:
      samples: 50000
      equivalence_check: true

  - type: "soundness"
    description: "Attempt to forge valid proofs"
    config:
      forge_attempts: 5000
      mutation_rate: 0.1

inputs:
  - name: "{{SECRET_INPUT_NAME}}"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "{{NULLIFIER_OUTPUT_NAME}}"
    type: "field"
    fuzz_strategy: "interesting_values"

  - name: "{{COMMITMENT_INPUT_NAME}}"
    type: "field"
    fuzz_strategy: "mutation"

mutations:
  - name: "modify_secret"
    probability: 0.3
    operations: ["add_one", "sub_one", "bit_flip"]

  - name: "boundary_secrets"
    probability: 0.2
    use_values: ["zero", "one", "max_field", "random"]

reporting:
  output_dir: "./reports/{{CIRCUIT_NAME}}"
  formats: ["json", "markdown", "sarif"]
  include_poc: true
  crash_reproduction: true
