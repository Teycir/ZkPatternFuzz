# AI-Generated Signature Verification Audit Template
#
# For circuits implementing EdDSA, ECDSA, or other signature schemes
# Variables are filled by Claude based on circuit analysis.
---
campaign:
  name: "AI-Generated Signature Audit"
  version: "2.0"
  target:
    framework: "{{FRAMEWORK}}"
    circuit_path: "{{CIRCUIT_PATH}}"
    main_component: "{{MAIN_COMPONENT}}"

  parameters:
    field: "{{FIELD_PRIME}}"
    max_constraints: 200000
    timeout_seconds: 900

includes:
  - "templates/traits/base.yaml"
  - "templates/traits/signature.yaml"
  - "templates/traits/hash.yaml"

profiles:
  detected:
    signature_scheme: "{{SIGNATURE_SCHEME}}"  # EdDSA, ECDSA, Schnorr
    curve: "{{CURVE}}"  # bn254, bls12-381, secp256k1

active_profile: "detected"

target_traits:
  uses_signature: true
  curve: "{{CURVE}}"
  hash_function: "{{HASH_FUNCTION}}"

invariants:
  - name: "signature_validity"
    invariant_type: constraint
    relation: "verify(pubkey, message, signature) == true"
    oracle: must_hold
    severity: "critical"
    description: "Valid signatures must verify correctly"

  - name: "signature_uniqueness"
    invariant_type: uniqueness
    relation: "∀(msg1, msg2): msg1 != msg2 => sig(msg1) != sig(msg2)"
    oracle: constraint_check
    severity: "high"
    description: "Different messages should have different signatures"

  - name: "no_signature_malleability"
    invariant_type: metamorphic
    transform: "negate_s_component"
    expected: "verification_fails"
    oracle: differential
    severity: "critical"
    description: "Negating S should invalidate signature"

  - name: "pubkey_on_curve"
    invariant_type: constraint
    relation: "is_on_curve(pubkey)"
    oracle: must_hold
    severity: "critical"
    description: "Public key must be a valid curve point"

schedule:
  - phase: "exploration"
    duration_sec: 60
    attacks: ["underconstrained", "boundary"]
    carry_corpus: true

  - phase: "signature_specific"
    duration_sec: 300
    attacks: ["soundness", "metamorphic"]
    early_terminate:
      on_critical_findings: 1
    carry_corpus: true

  - phase: "malleability_testing"
    duration_sec: 240
    attacks: ["witness_collision", "spec_inference"]
    carry_corpus: true

attacks:
  - type: "soundness"
    description: "Attempt signature forgery"
    config:
      forge_attempts: 10000
      mutation_rate: 0.05

  - type: "underconstrained"
    description: "Check for missing signature constraints"
    config:
      witness_pairs: 2000

  - type: "metamorphic"
    description: "Test signature malleability"
    config:
      transforms:
        - "negate_s"
        - "add_order_to_s"
        - "flip_pubkey_y"

  - type: "boundary"
    description: "Test curve point boundaries"
    config:
      test_values:
        - "0"  # Point at infinity
        - "generator"
        - "order-1"
        - "order"

inputs:
  - name: "{{PUBKEY_X_NAME}}"
    type: "field"
    constraints:
      - "on_curve"
    fuzz_strategy: "random"

  - name: "{{PUBKEY_Y_NAME}}"
    type: "field"
    fuzz_strategy: "random"

  - name: "{{MESSAGE_NAME}}"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x0"
      - "0x1"
      - "0xdeadbeef"

  - name: "{{SIG_R_NAME}}"
    type: "field"
    fuzz_strategy: "mutation"

  - name: "{{SIG_S_NAME}}"
    type: "field"
    fuzz_strategy: "mutation"

mutations:
  - name: "modify_signature"
    probability: 0.3
    operations: ["add_one", "negate", "bit_flip"]

  - name: "invalid_pubkey"
    probability: 0.2
    operations: ["random_point", "off_curve"]

  - name: "boundary_values"
    probability: 0.1
    use_values: ["zero", "order", "max_field"]

reporting:
  output_dir: "./reports/{{CIRCUIT_NAME}}"
  formats: ["json", "markdown", "sarif"]
  include_poc: true
  crash_reproduction: true
