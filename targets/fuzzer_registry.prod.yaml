    registry: local_cve_patterns
    description: "Halo2 readiness profile (soundness + underconstrained focused)"
    templates:
      - cveX35_halo2_signature_readiness_probe.yaml
      - cveX36_halo2_constraint_metadata_readiness_probe.yaml
      - cveX37_halo2_plonk_lookup_readiness_probe.yaml
