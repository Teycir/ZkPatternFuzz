    description: "Noir readiness profile (constraint/soundness focused)"
    templates:
      - cveX28_noir_multiplier_readiness_probe.yaml
      - cveX29_noir_main_signature_readiness_probe.yaml
      - cveX30_noir_two_input_main_readiness_probe.yaml
