      - cveX26_light_protocol_non_atomic_state_mono.yaml
      - cveX27_zkemail_underconstrained_spoofing_mono.yaml

  deep_multi:
    registry: local_cve_patterns
    description: "Target-dependent deep multi-stage YAML patterns"
    templates:
      - cveX01_dark_forest_missing_bit_length_multi.yaml
      - cveX02_bigint_missing_bit_length_multi.yaml
