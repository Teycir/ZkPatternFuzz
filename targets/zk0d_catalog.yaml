version: 1

catalog:
  name: zk0d_known_cve_deep_catalog
  description: Deep-only attack catalog. Mode 1 performs shallow skimming first; all listed targets are deep campaigns mapped from known ZK bug classes.

collections:
  deep_all:
    description: Run every deep attack target.
    targets:
      - soundness_forge_deep
      - frozenheart_proofforgery_deep
      - trustedsetup_vksubstitution_deep
      - underconstrained_witness_deep
      - nondeterministic_nullifier_deep
      - nullifier_rangecheck_deep
      - arithmetic_overflow_deep
      - bitlength_mismatch_deep
      - assigned_notconstrained_deep
      - unusedpubinputs_optimizedout_deep
      - regex_header_spoofing_deep
      - chain_atomicity_deep
      - execution_hijack_deep

  deep:
    description: Deep single-circuit attack targets.
    targets:
      - soundness_forge_deep
      - frozenheart_proofforgery_deep
      - trustedsetup_vksubstitution_deep
      - underconstrained_witness_deep
      - nondeterministic_nullifier_deep
      - nullifier_rangecheck_deep
      - arithmetic_overflow_deep
      - bitlength_mismatch_deep
      - assigned_notconstrained_deep
      - unusedpubinputs_optimizedout_deep
      - regex_header_spoofing_deep

  deep_extra:
    description: Deep chained/multi-step attack targets.
    targets:
      - chain_atomicity_deep
      - execution_hijack_deep

  common_underconstrained:
    description: Under-constrained circuit class.
    targets:
      - underconstrained_witness_deep

  common_nondeterministic:
    description: Nondeterministic circuit/nullifier class.
    targets:
      - nondeterministic_nullifier_deep

  common_arithmetic_overflow:
    description: Arithmetic over/underflow class.
    targets:
      - arithmetic_overflow_deep

  common_mismatching_bit_lengths:
    description: Mismatching bit-length class.
    targets:
      - bitlength_mismatch_deep

  common_unused_public_inputs:
    description: Unused public inputs optimized out class.
    targets:
      - unusedpubinputs_optimizedout_deep

  common_frozen_heart:
    description: Frozen-heart proof forgery class.
    targets:
      - frozenheart_proofforgery_deep

  common_trusted_setup_leak:
    description: Trusted setup leakage/substitution class.
    targets:
      - trustedsetup_vksubstitution_deep

  common_assigned_not_constrained:
    description: Assigned-but-not-constrained class.
    targets:
      - assigned_notconstrained_deep

