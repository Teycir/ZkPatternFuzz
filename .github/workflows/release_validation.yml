name: Release Validation

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:
    inputs:
      stable_ref:
        description: Previous stable tag/commit for rollback validation
        required: true
        type: string
      config_profile:
        description: Benchmark config profile
        required: false
        type: choice
        default: prod
        options:
          - dev
          - prod
      iterations:
        description: Iterations per benchmark run
        required: false
        default: "400"
        type: string
      timeout:
        description: Timeout seconds per benchmark run
        required: false
        default: "180"
        type: string
      required_passes:
        description: Consecutive benchmark summaries required
        required: false
        default: "2"
        type: string
      readiness_iterations:
        description: Iterations per backend readiness lane run
        required: false
        default: "120"
        type: string
      readiness_timeout:
        description: Timeout seconds per backend readiness lane scan
        required: false
        default: "45"
        type: string
      readiness_workers:
        description: Workers per backend readiness lane scan
        required: false
        default: "2"
        type: string
      required_backends:
        description: Comma-separated backends required by readiness gate
        required: false
        default: "noir,cairo,halo2"
        type: string
      required_maturity_backends:
        description: Comma-separated backends required by maturity score gate
        required: false
        default: "circom,noir,cairo,halo2"
        type: string
      min_backend_completion_rate:
        description: Minimum selector-matching completion ratio required per backend
        required: false
        default: "0.90"
        type: string
      min_backend_selector_matching_total_per_backend:
        description: Per-backend selector-matching classified run thresholds
        required: false
        default: "noir=25,cairo=4,halo2=4"
        type: string
      min_backend_enabled_targets:
        description: Minimum enabled readiness matrix targets required per backend
        required: false
        default: "5"
        type: string
      min_backend_maturity_score:
        description: Minimum maturity score required per backend (0.0-5.0)
        required: false
        default: "4.5"
        type: string
      backend_maturity_consecutive_days:
        description: Consecutive UTC daily maturity scorecards required (0 disables streak gate)
        required: false
        default: "0"
        type: string
      backend_maturity_consecutive_target_score:
        description: Target maturity score required by consecutive-day gate
        required: false
        default: "5.0"
        type: string
      backend_maturity_consecutive_backends:
        description: Comma-separated backends required by consecutive-day maturity gate
        required: false
        default: "halo2"
        type: string
      circom_flake_consecutive_days:
        description: Consecutive UTC daily Circom flake passes required (0 disables streak gate)
        required: false
        default: "0"
        type: string
      max_backend_runtime_error:
        description: Maximum runtime_error count allowed per backend
        required: false
        default: "0"
        type: string
      max_backend_preflight_failed:
        description: Maximum backend_preflight_failed count allowed per backend
        required: false
        default: "0"
        type: string
      max_backend_run_outcome_missing_rate:
        description: Maximum run_outcome_missing ratio allowed per backend and aggregate
        required: false
        default: "0.05"
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-candidate-gate:
    name: Release Candidate Gate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      REQUIRED_PASSES: ${{ github.event.inputs.required_passes || '2' }}
      CONFIG_PROFILE: ${{ github.event.inputs.config_profile || 'prod' }}
      ITERATIONS: ${{ github.event.inputs.iterations || '400' }}
      TIMEOUT: ${{ github.event.inputs.timeout || '180' }}
      READINESS_ITERATIONS: ${{ github.event.inputs.readiness_iterations || '120' }}
      READINESS_TIMEOUT: ${{ github.event.inputs.readiness_timeout || '45' }}
      READINESS_WORKERS: ${{ github.event.inputs.readiness_workers || '2' }}
      REQUIRED_BACKENDS: ${{ github.event.inputs.required_backends || 'noir,cairo,halo2' }}
      REQUIRED_MATURITY_BACKENDS: ${{ github.event.inputs.required_maturity_backends || 'circom,noir,cairo,halo2' }}
      MIN_BACKEND_COMPLETION_RATE: ${{ github.event.inputs.min_backend_completion_rate || '0.90' }}
      MIN_BACKEND_SELECTOR_MATCHING_TOTAL_PER_BACKEND: ${{ github.event.inputs.min_backend_selector_matching_total_per_backend || 'noir=25,cairo=4,halo2=4' }}
      MIN_BACKEND_ENABLED_TARGETS: ${{ github.event.inputs.min_backend_enabled_targets || '5' }}
      MIN_BACKEND_MATURITY_SCORE: ${{ github.event.inputs.min_backend_maturity_score || '4.5' }}
      BACKEND_MATURITY_CONSECUTIVE_DAYS: ${{ github.event_name == 'schedule' && '14' || (github.event.inputs.backend_maturity_consecutive_days || '0') }}
      BACKEND_MATURITY_CONSECUTIVE_TARGET_SCORE: ${{ github.event.inputs.backend_maturity_consecutive_target_score || '5.0' }}
      BACKEND_MATURITY_CONSECUTIVE_BACKENDS: ${{ github.event_name == 'schedule' && 'circom,noir,cairo,halo2' || (github.event.inputs.backend_maturity_consecutive_backends || 'halo2') }}
      CIRCOM_FLAKE_CONSECUTIVE_DAYS: ${{ github.event_name == 'schedule' && '14' || (github.event.inputs.circom_flake_consecutive_days || '0') }}
      MAX_BACKEND_RUNTIME_ERROR: ${{ github.event.inputs.max_backend_runtime_error || '0' }}
      MAX_BACKEND_PREFLIGHT_FAILED: ${{ github.event.inputs.max_backend_preflight_failed || '0' }}
      MAX_BACKEND_RUN_OUTCOME_MISSING_RATE: ${{ github.event.inputs.max_backend_run_outcome_missing_rate || '0.05' }}
      MIN_COMPLETION_RATE: "0.95"
      MIN_VULNERABLE_RECALL: ${{ github.event_name == 'schedule' && '0.20' || '0.00' }}
      MIN_PRECISION: ${{ github.event_name == 'schedule' && '0.20' || '0.00' }}
      MAX_SAFE_FPR: "0.20"
      MAX_SAFE_HIGH_CONF_FPR: "0.05"
    steps:
      - uses: actions/checkout@v4

      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Verify Node.js availability (pre-provisioned)
        run: |
          node --version || exit 1
          npm --version || exit 1

      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version

      - name: Verify backend toolchain availability (pre-provisioned)
        run: |
          command -v bubblewrap >/dev/null 2>&1 || command -v bwrap >/dev/null 2>&1 || { echo "::error::bubblewrap/bwrap not found in PATH"; exit 1; }
          command -v circom >/dev/null 2>&1 || { echo "::error::circom not found in PATH"; exit 1; }
          command -v snarkjs >/dev/null 2>&1 || { echo "::error::snarkjs not found in PATH"; exit 1; }
          command -v nargo >/dev/null 2>&1 || { echo "::error::nargo not found in PATH"; exit 1; }
          command -v scarb >/dev/null 2>&1 || { echo "::error::scarb not found in PATH"; exit 1; }

      - name: Build benchmark binaries
        run: cargo build --release --bin zk0d_batch --bin zk0d_benchmark

      - name: Restore streak history cache
        uses: actions/cache/restore@v4
        with:
          path: |
            artifacts/backend_maturity/history.json
            artifacts/circom_flake/history.json
          key: release-streak-history-${{ github.run_id }}
          restore-keys: |
            release-streak-history-

      - name: Ensure streak history directories exist
        run: |
          mkdir -p artifacts/backend_maturity artifacts/circom_flake

      - name: Run benchmark suite for consecutive-pass validation
        env:
          CIRCOM_INCLUDE_PATHS: third_party:node_modules
        run: |
          for pass in $(seq 1 "$REQUIRED_PASSES"); do
            echo "Running benchmark pass ${pass}/${REQUIRED_PASSES}"
            cargo run --release --bin zk0d_benchmark -- \
              --config-profile "$CONFIG_PROFILE" \
              --suite vulnerable_ground_truth,safe_regression \
              --trials 1 \
              --jobs 2 \
              --batch-jobs 1 \
              --workers 2 \
              --iterations "$ITERATIONS" \
              --timeout "$TIMEOUT"
          done

      - name: Run backend readiness lanes
        env:
          CIRCOM_INCLUDE_PATHS: third_party:node_modules
        run: |
          bash ./scripts/run_backend_readiness_lanes.sh \
            --iterations "$READINESS_ITERATIONS" \
            --timeout "$READINESS_TIMEOUT" \
            --workers "$READINESS_WORKERS" \
            --required-backends "$REQUIRED_BACKENDS" \
            --min-completion-rate "$MIN_BACKEND_COMPLETION_RATE" \
            --per-backend-min-selector-matching-total "$MIN_BACKEND_SELECTOR_MATCHING_TOTAL_PER_BACKEND" \
            --min-enabled-targets "$MIN_BACKEND_ENABLED_TARGETS" \
            --max-runtime-error "$MAX_BACKEND_RUNTIME_ERROR" \
            --max-backend-preflight-failed "$MAX_BACKEND_PREFLIGHT_FAILED" \
            --max-run-outcome-missing-rate "$MAX_BACKEND_RUN_OUTCOME_MISSING_RATE" \
            --enforce-dashboard \
            --enforce-tool-sandbox

      - name: Validate release candidate gate
        run: |
          bash ./scripts/release_candidate_gate.sh \
            --bench-root artifacts/benchmark_runs \
            --required-passes "$REQUIRED_PASSES" \
            --required-backends "$REQUIRED_BACKENDS" \
            --required-maturity-backends "$REQUIRED_MATURITY_BACKENDS" \
            --min-backend-completion-rate "$MIN_BACKEND_COMPLETION_RATE" \
            --min-backend-selector-matching-total-per-backend "$MIN_BACKEND_SELECTOR_MATCHING_TOTAL_PER_BACKEND" \
            --min-backend-enabled-targets "$MIN_BACKEND_ENABLED_TARGETS" \
            --min-backend-maturity-score "$MIN_BACKEND_MATURITY_SCORE" \
            --backend-maturity-consecutive-days "$BACKEND_MATURITY_CONSECUTIVE_DAYS" \
            --backend-maturity-consecutive-target-score "$BACKEND_MATURITY_CONSECUTIVE_TARGET_SCORE" \
            --backend-maturity-consecutive-backends "$BACKEND_MATURITY_CONSECUTIVE_BACKENDS" \
            --circom-flake-consecutive-days "$CIRCOM_FLAKE_CONSECUTIVE_DAYS" \
            --max-backend-runtime-error "$MAX_BACKEND_RUNTIME_ERROR" \
            --max-backend-preflight-failed "$MAX_BACKEND_PREFLIGHT_FAILED" \
            --max-backend-run-outcome-missing-rate "$MAX_BACKEND_RUN_OUTCOME_MISSING_RATE"

      - name: Capture compact streak status
        if: always()
        run: |
          ./scripts/run_release_streak_status.sh > .github_release_streak_status.txt
          cat .github_release_streak_status.txt

      - name: Publish streak summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path(".github_release_validation_summary.md")
          lines = ["## Release Streak Summary", ""]

          maturity = Path("artifacts/backend_maturity/latest_scorecard.json")
          if maturity.is_file():
              payload = json.loads(maturity.read_text(encoding="utf-8"))
              gate = payload.get("consecutive_gate", {}) if isinstance(payload, dict) else {}
              lines.append(
                  f"- Backend maturity consecutive gate: {'PASS' if gate.get('overall_pass') else 'FAIL'} "
                  f"(target_days={gate.get('target_days')}, target_score={gate.get('target_score')})"
              )
              per_backend = gate.get("per_backend", {}) if isinstance(gate, dict) else {}
              for backend in sorted(per_backend):
                  entry = per_backend.get(backend, {})
                  lines.append(
                      f"- {backend}: streak_days={entry.get('current_streak_days')}/"
                      f"{entry.get('required_streak_days')}, "
                      f"remaining_days={entry.get('remaining_streak_days')}, "
                      f"projected_completion_day_utc={entry.get('projected_completion_day_utc')}"
                  )
          else:
              lines.append("- Backend maturity consecutive gate: missing scorecard artifact")

          flake = Path("artifacts/circom_flake/latest_report.json")
          if flake.is_file():
              payload = json.loads(flake.read_text(encoding="utf-8"))
              lines.append(
                  f"- Circom flake consecutive gate: {'PASS' if payload.get('overall_pass') else 'FAIL'} "
                  f"(streak_days={payload.get('current_streak_days')}/{payload.get('required_consecutive_days')}, "
                  f"remaining_days={payload.get('remaining_streak_days')}, "
                  f"projected_completion_day_utc={payload.get('projected_completion_day_utc')})"
              )
          else:
              lines.append("- Circom flake consecutive gate: missing flake artifact")

          compact = Path(".github_release_streak_status.txt")
          if compact.is_file():
              lines.extend(["", "### Compact Status", "", "```text"])
              lines.extend(compact.read_text(encoding="utf-8").rstrip().splitlines())
              lines.append("```")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_path.read_text(encoding="utf-8"))
          PY
          cat .github_release_validation_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-benchmark-${{ github.run_id }}
          path: |
            artifacts/benchmark_runs/
            artifacts/backend_readiness/
            artifacts/backend_maturity/
            artifacts/circom_flake/
            artifacts/circom_hermetic/
            artifacts/backend_capacity_fitness/
            artifacts/release_candidate_validation/
          retention-days: 30

      - name: Save streak history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            artifacts/backend_maturity/history.json
            artifacts/circom_flake/history.json
          key: release-streak-history-${{ github.run_id }}

  rollback-validation:
    name: Rollback Validation
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: release-candidate-gate
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version

      - name: Run rollback validation against stable ref
        run: |
          bash ./scripts/rollback_validate.sh --stable-ref "${{ inputs.stable_ref }}"
