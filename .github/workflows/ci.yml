name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run nightly fuzzing campaigns at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Basic checks: format, clippy, build
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version
      
      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Panic surface gate
        run: cargo run --locked --bin zkf_checks -- panic-surface --repo-root . --fail-on-stale

      - name: Repo hygiene gate
        run: cargo run --locked --bin zkf_checks -- repo-hygiene --repo-root .

      - name: Production/test separation gate
        run: cargo run --locked --bin zkf_checks -- prod-test-separation --repo-root .

      - name: Readiness matrix target coverage gate
        run: python3 -m unittest -q tests/test_readiness_matrix_targets.py tests/test_backend_readiness_dashboard.py tests/test_backend_maturity_scorecard.py tests/test_circom_flake_gate.py tests/test_release_streak_status.py tests/test_build_external_target_closure_table.py

      # Full warning-free lint gate across all targets/features.
      # Scope to production crates/binaries to keep the gate stable across
      # clippy upgrades that introduce new test-only style lints.
      - name: Clippy (Warning-Free All Targets)
        run: cargo clippy --locked --workspace --all-features --lib --bins -- -D warnings
      
      - name: Build
        run: cargo build --all-features

  # Z3 compatibility checks across supported desktop OSes.
  # This validates solver crates independently from broader backend/toolchain constraints.
  z3-cross-platform:
    name: Z3 Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Install and verify Z3 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version

      - name: Install and verify Z3 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            brew install z3
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version

      # On Windows we default to static-linking Z3 in solver crates.
      - name: Check solver crates
        run: cargo check -p zk-constraints -p zk-symbolic

      - name: Check solver crates (portable static mode)
        run: cargo check -p zk-constraints -p zk-symbolic --features z3-static

  # Run all tests
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version
      
      - name: Run tests
        run: cargo test --all-features --verbose
      
      - name: Run doc tests
        run: cargo test --doc --all-features

  # Real backend integration tests (Circom, snarkjs, Noir)
  real-backend-tests:
    name: Real Backend Tests
    runs-on: ubuntu-latest
    needs: check
    env:
      ZKFUZZ_REAL_BACKENDS: 1
    steps:
      - uses: actions/checkout@v4

      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Verify Node.js availability (pre-provisioned)
        run: |
          node --version || exit 1
          npm --version || exit 1

      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version

      - name: Verify backend toolchain availability (pre-provisioned)
        run: |
          command -v circom >/dev/null 2>&1 || { echo "::error::circom not found in PATH"; exit 1; }
          command -v snarkjs >/dev/null 2>&1 || { echo "::error::snarkjs not found in PATH"; exit 1; }
          command -v nargo >/dev/null 2>&1 || { echo "::error::nargo not found in PATH"; exit 1; }

      - name: Run real backend integration tests
        run: cargo test --test backend_integration_tests --all-features --verbose

  # Release hardening matrix:
  # - fast-smoke runs on push/PR (blocking gate)
  # - deep-scheduled runs nightly (non-blocking alert + trend artifacts)
  release-hardening-matrix:
    name: Release Hardening Matrix (${{ matrix.track }})
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - track: fast-smoke
            event_scope: ci
            config_profile: dev
            suite: vulnerable_ground_truth,safe_regression
            trials: 1
            jobs: 1
            batch_jobs: 1
            workers: 1
            iterations: 150
            timeout: 120
            min_completion_rate: "0.90"
            min_vulnerable_recall: "0.00"
            min_precision: "0.00"
            max_safe_fpr: "0.25"
            max_safe_high_conf_fpr: "0.05"
            retention_days: 14
          - track: deep-scheduled
            event_scope: schedule
            config_profile: prod
            suite: vulnerable_ground_truth,safe_regression
            trials: 2
            jobs: 2
            batch_jobs: 1
            workers: 2
            iterations: 400
            timeout: 180
            min_completion_rate: "0.95"
            min_vulnerable_recall: "0.00"
            min_precision: "0.00"
            max_safe_fpr: "0.20"
            max_safe_high_conf_fpr: "0.05"
            retention_days: 30
    if: |
      (github.event_name != 'schedule' && matrix.event_scope == 'ci') ||
      (github.event_name == 'schedule' && matrix.event_scope == 'schedule')
    steps:
      - uses: actions/checkout@v4

      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Verify Node.js availability (pre-provisioned)
        run: |
          node --version || exit 1
          npm --version || exit 1

      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.track }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.track }}-
            ${{ runner.os }}-cargo-

      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version

      - name: Verify benchmark toolchain availability (pre-provisioned)
        run: |
          command -v circom >/dev/null 2>&1 || { echo "::error::circom not found in PATH"; exit 1; }
          command -v snarkjs >/dev/null 2>&1 || { echo "::error::snarkjs not found in PATH"; exit 1; }

      - name: Build benchmark binaries
        run: cargo build --release --bin zk0d_batch --bin zk0d_benchmark

      - name: Validate failure dashboard regression tests
        run: cargo test --test test_benchmark_failure_dashboard

      - name: Run benchmark suites
        env:
          CIRCOM_INCLUDE_PATHS: third_party:node_modules
        run: |
          cargo run --release --bin zk0d_benchmark -- \
            --config-profile ${{ matrix.config_profile }} \
            --suite ${{ matrix.suite }} \
            --trials ${{ matrix.trials }} \
            --jobs ${{ matrix.jobs }} \
            --batch-jobs ${{ matrix.batch_jobs }} \
            --workers ${{ matrix.workers }} \
            --iterations ${{ matrix.iterations }} \
            --timeout ${{ matrix.timeout }}

      - name: Apply benchmark regression gate
        id: matrix_gate
        continue-on-error: true
        env:
          MIN_COMPLETION_RATE: ${{ matrix.min_completion_rate }}
          MIN_VULNERABLE_RECALL: ${{ matrix.min_vulnerable_recall }}
          MIN_PRECISION: ${{ matrix.min_precision }}
          MAX_SAFE_FPR: ${{ matrix.max_safe_fpr }}
          MAX_SAFE_HIGH_CONF_FPR: ${{ matrix.max_safe_high_conf_fpr }}
        run: cargo run --locked --bin zkf_checks -- benchmark-regression-gate --benchmark-root artifacts/benchmark_runs

      - name: Enforce fast-smoke gate
        if: matrix.track == 'fast-smoke' && steps.matrix_gate.outcome == 'failure'
        run: |
          echo "::error::Fast smoke regression gate failed."
          exit 1

      - name: Generate nightly trend artifacts
        if: matrix.track == 'deep-scheduled'
        env:
          ZKF_FAILURE_MAX_RATE_LOCK_CONTENTION: ${{ vars.ZKF_FAILURE_MAX_RATE_LOCK_CONTENTION }}
          ZKF_FAILURE_MAX_RATE_SETUP_TOOLING: ${{ vars.ZKF_FAILURE_MAX_RATE_SETUP_TOOLING }}
          ZKF_FAILURE_MAX_RATE_TIMEOUTS: ${{ vars.ZKF_FAILURE_MAX_RATE_TIMEOUTS }}
          ZKF_FAILURE_MAX_RATE_STABILITY_RUNTIME: ${{ vars.ZKF_FAILURE_MAX_RATE_STABILITY_RUNTIME }}
          ZKF_FAILURE_MAX_RATE_CONTRACT_OR_CONFIG: ${{ vars.ZKF_FAILURE_MAX_RATE_CONTRACT_OR_CONFIG }}
          ZKF_FAILURE_MAX_RATE_OTHER_FAILURE: ${{ vars.ZKF_FAILURE_MAX_RATE_OTHER_FAILURE }}
        run: |
          cargo run --locked --bin zkf_checks -- benchmark-trend-report \
            --benchmark-root artifacts/benchmark_runs \
            --output-dir artifacts/benchmark_trends \
            --history-file artifacts/benchmark_trends/history.jsonl
          cargo run --locked --bin zkf_checks -- benchmark-failure-dashboard \
            --benchmark-root artifacts/benchmark_runs \
            --output-dir artifacts/benchmark_trends

      - name: Emit nightly regression alert
        if: matrix.track == 'deep-scheduled' && steps.matrix_gate.outcome == 'failure'
        run: |
          echo "::warning::Nightly deep-scheduled regression detected. See artifacts/benchmark_trends/latest_trend.md and benchmark summaries."

      - name: Upload release-hardening artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-hardening-${{ matrix.track }}-${{ github.run_id }}
          path: |
            artifacts/benchmark_runs/
            artifacts/benchmark_trends/
          retention-days: ${{ matrix.retention_days }}

  # Coverage reporting
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version

      - name: Verify coverage toolchain availability (pre-provisioned)
        run: |
          command -v cargo-llvm-cov >/dev/null 2>&1 || { echo "::error::cargo-llvm-cov not found in PATH"; exit 1; }
      
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Performance benchmarks
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version
      
      - name: Run benchmarks
        run: cargo bench --all-features -- --noplot
      
      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion

  # Nightly fuzzing campaigns on real circuits
  nightly-fuzzing:
    name: Nightly Fuzzing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version
      
      - name: Build release
        run: cargo build --release --all-features
      
      - name: Run Fixture Merkle Audit Campaign
        run: |
          cargo run --release -- \
            --config tests/campaigns/fixture_merkle_audit.yaml \
            --output-dir ./fuzzing-results/merkle \
            --seed ${{ github.run_id }}
        continue-on-error: true
      
      - name: Run Tornado Core Audit Campaign
        run: |
          cargo run --release -- \
            --config tests/campaigns/tornado_core_audit.yaml \
            --output-dir ./fuzzing-results/tornado \
            --seed ${{ github.run_id }}
        continue-on-error: true
      
      - name: Run Semaphore Audit Campaign
        run: |
          cargo run --release -- \
            --config tests/campaigns/semaphore_audit.yaml \
            --output-dir ./fuzzing-results/semaphore \
            --seed ${{ github.run_id }}
        continue-on-error: true
      
      - name: Upload fuzzing results
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-results-${{ github.run_id }}
          path: fuzzing-results/
          retention-days: 30
      
      - name: Check for critical findings
        run: |
          [ -d fuzzing-results/ ] && grep -rqm 1 --include="*.json" --include="*.md" "CRITICAL" fuzzing-results/ && \
            echo "::warning::Critical findings detected in nightly fuzzing!" || true

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify cargo-audit availability (pre-provisioned)
        run: command -v cargo-audit >/dev/null 2>&1 || { echo "::error::cargo-audit not found in PATH"; exit 1; }
      
      - name: Run security audit
        run: cargo audit

  # Multi-platform build matrix
  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Windows excluded due to Z3 build complexity
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install and verify Z3 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version

      - name: Install and verify Z3 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            brew install z3
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version
      
      - name: Build
        run: cargo build --release --all-features
      
      - name: Test
        run: cargo test --release --all-features

  # Release build
  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Rust toolchain availability (pre-provisioned)
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install and verify Z3
        run: |
          if ! command -v z3 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3 libz3-dev
          fi
          command -v z3 >/dev/null 2>&1 || { echo "::error::z3 not found in PATH"; exit 1; }
          z3 --version
      
      - name: Build release binary
        run: cargo build --release --all-features
      
      - name: Create release archive
        run: |
          mkdir -p release
          cp target/release/zk-fuzzer release/
          cp README.md LICENSE release/ 2>/dev/null || true
          cp -r templates release/
          tar -czvf zk-fuzzer-linux-x86_64.tar.gz -C release .
      
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: zk-fuzzer-linux-x86_64
          path: zk-fuzzer-linux-x86_64.tar.gz
