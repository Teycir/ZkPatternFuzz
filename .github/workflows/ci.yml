name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run nightly fuzzing campaigns at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Basic checks: format, clippy, build
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev z3
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Build
        run: cargo build --all-features

  # Run all tests
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev z3
      
      - name: Run tests
        run: cargo test --all-features --verbose
      
      - name: Run doc tests
        run: cargo test --doc --all-features

  # Coverage reporting
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      
      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev z3
      
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Performance benchmarks
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev z3
      
      - name: Run benchmarks
        run: cargo bench --all-features -- --noplot
      
      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion

  # Nightly fuzzing campaigns on real circuits
  nightly-fuzzing:
    name: Nightly Fuzzing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev z3
      
      - name: Build release
        run: cargo build --release --all-features
      
      - name: Run Mock Merkle Audit Campaign
        run: |
          cargo run --release -- \
            --config tests/campaigns/mock_merkle_audit.yaml \
            --output-dir ./fuzzing-results/merkle \
            --seed ${{ github.run_id }}
        continue-on-error: true
      
      - name: Run Tornado Core Audit Campaign
        run: |
          cargo run --release -- \
            --config tests/campaigns/tornado_core_audit.yaml \
            --output-dir ./fuzzing-results/tornado \
            --seed ${{ github.run_id }}
        continue-on-error: true
      
      - name: Run Semaphore Audit Campaign
        run: |
          cargo run --release -- \
            --config tests/campaigns/semaphore_audit.yaml \
            --output-dir ./fuzzing-results/semaphore \
            --seed ${{ github.run_id }}
        continue-on-error: true
      
      - name: Upload fuzzing results
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-results-${{ github.run_id }}
          path: fuzzing-results/
          retention-days: 30
      
      - name: Check for critical findings
        run: |
          [ -d fuzzing-results/ ] && grep -rqm 1 --include="*.json" --include="*.md" "CRITICAL" fuzzing-results/ && \
            echo "::warning::Critical findings detected in nightly fuzzing!" || true

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Run security audit
        run: cargo audit

  # Multi-platform build matrix
  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Windows excluded due to Z3 build complexity
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install Z3 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev z3
      
      - name: Install Z3 (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install z3
      
      - name: Build
        run: cargo build --release --all-features
      
      - name: Test
        run: cargo test --release --all-features

  # Release build
  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Verify Rust installation
        run: |
          rustc --version || exit 1
          cargo --version || exit 1
      
      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev z3
      
      - name: Build release binary
        run: cargo build --release --all-features
      
      - name: Create release archive
        run: |
          mkdir -p release
          cp target/release/zk-fuzzer release/
          cp README.md LICENSE release/ 2>/dev/null || true
          cp -r templates release/
          tar -czvf zk-fuzzer-linux-x86_64.tar.gz -C release .
      
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: zk-fuzzer-linux-x86_64
          path: zk-fuzzer-linux-x86_64.tar.gz
