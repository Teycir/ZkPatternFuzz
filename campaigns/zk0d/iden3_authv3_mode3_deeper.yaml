---
# Custom Mode 3 chain for iden3 AuthV3 (analyzed from authV3.circom + auth/authV3.circom)
# Output: userID (index 0) derived from genesisID + profileNonce
# Inputs (indices): challenge[0], gistRoot[1], genesisID[2], profileNonce[3], ... (see run logs)

includes:
  - "templates/attacks/evidence_core.yaml"

campaign:
  name: "zk0d_iden3_authv3_mode3_deeper"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/authV3-8-32.circom"
    main_component: "AuthV3"
  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 300
    build_dir_base: "./build/zk0d"
    strict_backend: true
    evidence_mode: true
    # Production-level budget (AFL-style: high iterations + long wall-clock)
    chain_budget_seconds: 3600
    chain_iterations: 200000

# Mode 3 chain: wire userID output into genesisID/profileNonce/challenge across steps
chains:
  - name: "authv3_userid_feedback_chain"
    description: "Feed userID into identity/challenge inputs across steps to stress multi-step linkage"
    circuits:
      authv3:
        path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/authV3-8-32.circom"
        main_component: "AuthV3"
        framework: "circom"
    steps:
      - circuit_ref: "authv3"
        input_wiring: !fresh
        label: "Seed auth"
      - circuit_ref: "authv3"
        input_wiring: !from_prior_output
          step: 0
          mapping:
            - [0, 2]  # userID -> genesisID
            - [0, 3]  # userID -> profileNonce
        label: "Reuse userID as identity inputs"
      - circuit_ref: "authv3"
        input_wiring: !from_prior_output
          step: 1
          mapping:
            - [0, 0]  # userID -> challenge
            - [0, 2]  # userID -> genesisID
        label: "Reuse userID as challenge + genesisID"
      - circuit_ref: "authv3"
        input_wiring: !from_prior_output
          step: 2
          mapping:
            - [0, 2]  # userID -> genesisID
        label: "Propagate again"
    assertions:
      - name: "wire_0_to_1_genesis"
        relation: "step[0].out[0] == step[1].in[2]"
        severity: "high"
        description: "Step 1 genesisID must receive step 0 userID"
      - name: "wire_0_to_1_nonce"
        relation: "step[0].out[0] == step[1].in[3]"
        severity: "high"
        description: "Step 1 profileNonce must receive step 0 userID"
      - name: "wire_1_to_2_challenge"
        relation: "step[1].out[0] == step[2].in[0]"
        severity: "high"
        description: "Step 2 challenge must receive step 1 userID"
      - name: "wire_1_to_2_genesis"
        relation: "step[1].out[0] == step[2].in[2]"
        severity: "high"
        description: "Step 2 genesisID must receive step 1 userID"
      - name: "wire_2_to_3_genesis"
        relation: "step[2].out[0] == step[3].in[2]"
        severity: "high"
        description: "Step 3 genesisID must receive step 2 userID"

reporting:
  output_dir: "./reports/zk0d/iden3_authv3_mode3_deeper"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
