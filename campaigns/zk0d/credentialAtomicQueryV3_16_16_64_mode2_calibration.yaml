---
# Mode 2 (Evidence) campaign for credentialAtomicQueryV3-16-16-64.
# Inputs are flattened scalars in the exact Circom top-level order (public first, then private),
# derived from the compiled .sym (6 outputs, 77 public inputs, 124 private inputs).

campaign:
  name: "zk0d_credentialAtomicQueryV3_16_16_64_mode2_calibration"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/credentialAtomicQueryV3-16-16-64.circom"
    main_component: "main"
  parameters:
    field: "bn254"
    max_constraints: 120000
    timeout_seconds: 600
    build_dir_base: "./build/zk0d"
    seed_inputs_path: "campaigns/zk0d/credentialAtomicQueryV3_seed_inputs.json"

    # Backend behavior (NOTE: campaign.parameters uses a flattened key/value map; do not nest under
    # an `additional:` key or the engine will ignore these settings).
    strict_backend: true
    evidence_mode: true

    # Reduce noise on Poseidon-heavy circuits; this oracle tends to flag "near modulus"
    # outputs that are expected in hash-based constructions.
    disabled_oracles:
      - "arithmetic_overflow_oracle"
      - "underconstrained_oracle"

    # Evidence mode defaults to process isolation; disable for performance on large circuits.
    per_exec_isolation: false
    evidence_allow_no_isolation: true

    # Circom backend
    circom_skip_compile_if_artifacts: true
    circom_skip_constraint_check: true
    circom_auto_setup_keys: false

    # Keep the run lightweight (this circuit is large).
    symbolic_enabled: false
    constraint_guided_enabled: false

invariants:
  # Smoke invariant: always true, used to satisfy evidence-mode requirement without producing
  # invariant-driven findings. Replace with real invariants once we have a valid seed witness.
  - name: "smoke_tautology"
    invariant_type: constraint
    relation: "proofType == proofType"
    oracle: must_hold
    severity: "info"
    description: "Smoke-only invariant so evidence mode can run without producing findings."

attacks:
  - type: "boundary"
    description: "Boundary value testing"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"

