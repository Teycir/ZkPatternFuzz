---
# Sniper campaign: derived from skimmer hints for tornado-core withdraw.circom
# Focus: bit decomposition, range checks, nullifier reuse, domain separation
includes:
  - "templates/invariants/merkle_path_indices_20.yaml"
  - "templates/invariants/nullifier_secret_248.yaml"
  - "templates/invariants/fee_refund_u64.yaml"
campaign:
  name: "zk0d_tornado_withdraw_sniper"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/tornado-core/circuits/withdraw.circom"
    main_component: "Withdraw"
  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 300
    build_dir_base: "./build/zk0d"
    seed_inputs_path: "campaigns/zk0d/tornado_withdraw_seed_inputs.json"
    evidence_mode: true
    constraint_guided_enabled: true
    constraint_guided_max_paths: 200
    constraint_guided_max_depth: 200
    constraint_guided_solutions_per_path: 2
    fuzzing_iterations: 5000
    fuzzing_timeout_seconds: 300

# Targeted, evidence-driven attacks
attacks:
  - type: "constraint_inference"
    description: "Enforce skimmer-derived invariants with confirmation"
    config:
      confidence_threshold: 0.8
      confirm_violations: true

  - type: "metamorphic"
    description: "Domain-separation sanity via targeted transforms"
    config:
      num_tests: 50

  - type: "witness_collision"
    description: "Detect distinct witnesses with same public outputs"
    config:
      samples: 50
      scope_public_inputs: true

# Inputs (flattened to match circom signal order)
inputs:
  - name: "root"
    type: "field"
    fuzz_strategy: "random"

  - name: "nullifierHash"
    type: "field"
    fuzz_strategy: "random"

  - name: "recipient"
    type: "field"
    fuzz_strategy: "random"

  - name: "relayer"
    type: "field"
    fuzz_strategy: "random"

  - name: "fee"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x00"
      - "0x01"
      - "0x02"
      - "0xffffffffffffffff"
      - "0x10000000000000000" # 2^64 (range violation probe)

  - name: "refund"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x00"
      - "0x01"
      - "0x02"
      - "0xffffffffffffffff"
      - "0x10000000000000000" # 2^64 (range violation probe)

  - name: "nullifier"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x00"
      - "0x01"
      - "0x02"
      - "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
      - "0x30644e72e131a029b85045b68181585d2833e84879b9709143e1f593f0000000"

  - name: "secret"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x00"
      - "0x01"
      - "0x02"
      - "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
      - "0x30644e72e131a029b85045b68181585d2833e84879b9709143e1f593f0000000"

  - name: "pathElements_0"
    type: "field"
    fuzz_strategy: "random"
  - name: "pathElements_1"
    type: "field"
    fuzz_strategy: "random"
  - name: "pathElements_2"
    type: "field"
    fuzz_strategy: "random"
