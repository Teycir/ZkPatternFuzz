# Target traits (used for auto metamorphic hints)
target_traits:
  uses_merkle: true
  uses_nullifier: true
  uses_commitment: true
  hash_function: "mimc"
  range_checks: ["u64", "bitlen:248"]

# Skimmer-derived invariants (evidence-enforced)
invariants:
  - name: "domain_separation_root_nullifierhash"
    invariant_type: metamorphic
    transform: "swap_inputs(root, nullifierHash)"
    expected: "output_changed"
    severity: "high"
    description: "Swapping root/nullifierHash should change output if domain separation/binding is correct"

# Semantic oracles aligned with skimmer hints
oracles:
  - name: "nullifier"
    severity: "critical"
    description: "Nullifier collisions, determinism, entropy"
  - name: "merkle"
    severity: "high"
    description: "Merkle path soundness/binary index checks"
  - name: "range"
    severity: "high"
    description: "Range-check bypass and boundary issues"

reporting:
  output_dir: "./reports/zk0d/tornado_withdraw_sniper"
  formats: ["json", "markdown", "sarif"]
  include_poc: true
  crash_reproduction: true
