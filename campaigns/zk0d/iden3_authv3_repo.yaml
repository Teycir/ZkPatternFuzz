# Target traits (helps auto metamorphic relations)
target_traits:
  uses_merkle: true
  uses_signature: true
  hash_function: "poseidon"
  range_checks: []

# Evidence invariants (manual)
invariants:
  - name: "auth_claim_nonrev_noaux_binary"
    invariant_type: constraint
    relation: "authClaimNonRevMtpNoAux in {0,1}"
    oracle: must_hold
    severity: "critical"
    description: "Non-revocation aux flag must be binary"

  - name: "gist_noaux_binary"
    invariant_type: constraint
    relation: "gistMtpNoAux in {0,1}"
    oracle: must_hold
    severity: "critical"
    description: "On-chain SMT aux flag must be binary"

  - name: "signature_s_range"
    invariant_type: range
    relation: "0 <= challengeSignatureS < 2^253"
    oracle: must_hold
    severity: "critical"
    description: "EdDSA S scalar must be within canonical range"

  - name: "genesis_id_range"
    invariant_type: range
    relation: "0 <= genesisID < 2^248"
    oracle: must_hold
    severity: "high"
    description: "Genesis ID must fit within 248 bits"

  - name: "state_range"
    invariant_type: range
    relation: "0 <= state < 2^254"
    oracle: must_hold
    severity: "high"
    description: "State must fit within 254 bits"

reporting:
  output_dir: "./reports/zk0d/iden3_authv3_repo"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
