---
campaign:
  name: "zk0d_iden3_authv3_repo"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/authV3.circom"
    main_component: "AuthV3"
  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 300
    build_dir_base: "./build/zk0d"
    seed_inputs_path: "campaigns/zk0d/iden3_authv3_seed_inputs.json"

# Evidence-mode attack set
attacks:
  - type: "constraint_inference"
    description: "Detect missing constraints with confirmation"
    config:
      confidence_threshold: 0.7
      confirm_violations: true

  - type: "boundary"
    description: "Boundary value testing"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"

