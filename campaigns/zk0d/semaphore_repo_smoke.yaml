---
campaign:
  name: "zk0d_semaphore_repo_smoke"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "campaigns/zk0d/semaphore_main.circom"
    main_component: "main"
  parameters:
    field: "bn254"
    max_constraints: 20000
    timeout_seconds: 120
    build_dir_base: "./build/zk0d/semaphore_smoke"
    include_paths:
      - "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/semaphore/node_modules"
      - "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/semaphore/packages/circuits/node_modules"
      - "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/semaphore/node_modules/circomlib/circuits"
      - "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/semaphore/packages/circuits/node_modules/circomlib/circuits"
      - "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/semaphore/node_modules/@zk-kit/binary-merkle-root.circom/src"
      - "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/semaphore/packages/circuits/node_modules/@zk-kit/binary-merkle-root.circom/src"
    additional:
      strict_backend: true
      mark_fallback: true
      per_exec_isolation: true
      execution_timeout_ms: 1000
      constraint_guided_enabled: false
      symbolic_max_paths: 0
      symbolic_max_depth: 0
      symbolic_solver_timeout_ms: 500
      oracle_validation: true

invariants:
  - name: "merkle_length_max_20"
    invariant_type: range
    relation: "merkleProofLength <= 20"
    oracle: must_hold
    severity: "high"
    description: "Semaphore(20) proof length must not exceed depth."
  - name: "proof_index_nonnegative"
    invariant_type: range
    relation: "0 <= merkleProofIndex"
    oracle: must_hold
    severity: "medium"
    description: "Merkle proof index must remain in field range."

attacks:
  - type: "boundary"
    description: "Fast boundary-value exploration for proof-length/index parameters."
    config:
      test_values:
        - "0"
        - "1"
        - "2"
        - "20"
        - "21"

inputs:
  - name: "message"
    type: "field"
    fuzz_strategy: "random"
  - name: "scope"
    type: "field"
    fuzz_strategy: "random"
  - name: "secret"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x0"
      - "0x1"
      - "0x2"
  - name: "merkleProofLength"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "20"
      - "21"
  - name: "merkleProofIndex"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "1048575"
  - name: "merkleProofSiblings_0"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_1"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_2"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_3"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_4"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_5"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_6"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_7"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_8"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_9"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_10"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_11"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_12"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_13"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_14"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_15"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_16"
    type: "field"
    fuzz_strategy: "random"
  - name: "merkleProofSiblings_17"
    type: "field"
