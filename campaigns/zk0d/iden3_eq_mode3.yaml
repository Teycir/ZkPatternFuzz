---
campaign:
  name: "zk0d_iden3_eq_mode3"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/test/circuits/eq.circom"
    main_component: "EqWithLog"
  parameters:
    field: "bn254"
    max_constraints: 50000
    timeout_seconds: 300
    build_dir_base: "./build/zk0d"
    strict_backend: true
    evidence_mode: true
    chain_budget_seconds: 300
    chain_iterations: 2000

chains:
  - name: "eq_three_step_chain"
    description: "Propagate equality output across three steps"
    circuits:
      eq:
        path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/test/circuits/eq.circom"
        main_component: "EqWithLog"
        framework: "circom"
    steps:
      - circuit_ref: "eq"
        input_wiring: fresh
        label: "Seed equality"
      - circuit_ref: "eq"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [0, 0]
        label: "Propagate step0.out[0] into step1.in[0]"
      - circuit_ref: "eq"
        input_wiring:
          from_prior_output:
            step: 1
            mapping:
              - [0, 0]
        label: "Propagate step1.out[0] into step2.in[0]"
    assertions:
      - name: "wire_step0_to_step1"
        relation: "step[0].out[0] == step[1].in[0]"
        severity: "high"
        description: "Step 1 should receive step 0 output in input 0"
      - name: "wire_step1_to_step2"
        relation: "step[1].out[0] == step[2].in[0]"
        severity: "high"
        description: "Step 2 should receive step 1 output in input 0"
      - name: "step1_success"
        relation: "step[1].success == true"
        severity: "critical"
        description: "Step 1 must execute successfully"
      - name: "step2_success"
        relation: "step[2].success == true"
        severity: "critical"
        description: "Step 2 must execute successfully"

reporting:
  output_dir: "./reports/zk0d/iden3_eq_mode3"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
