---
includes:
  - "templates/attacks/evidence_core.yaml"

campaign:
  name: "zk0d_iden3_authv3_8_32_mode2"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/authV3-8-32.circom"
    main_component: "AuthV3"
  parameters:
    field: "bn254"
    max_constraints: 220000
    timeout_seconds: 180
    build_dir_base: "./build/zk0d"
    additional:
      strict_backend: true
      evidence_mode: true

invariants:
  - name: "challenge_field_element"
    invariant_type: range
    relation: "0 <= challenge"
    oracle: must_hold
    severity: "medium"
    description: "Challenge must be a valid field element."
  - name: "profile_nonce_field_element"
    invariant_type: range
    relation: "0 <= profileNonce"
    oracle: must_hold
    severity: "medium"
    description: "Profile nonce must be a valid field element."
  - name: "noaux_flag_binary"
    invariant_type: range
    relation: "authClaimNonRevMtpNoAux in {0,1}"
    oracle: must_hold
    severity: "high"
    description: "Auxiliary-node absence flag must be binary."

inputs:
  - name: "default_input"
    type: "field"
    fuzz_strategy: "random"
    interesting:
      - "0"
      - "1"

reporting:
  output_dir: "./reports/zk0d/iden3_authv3_8_32_mode2"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
