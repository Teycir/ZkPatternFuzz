---
includes:
  - "../templates/attacks/evidence_core.yaml"

campaign:
  name: "zk0d_credentialAtomicQueryV3OffChain_mode2"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/credentialAtomicQueryV3-16-16-64.circom"
    main_component: "main"
  parameters:
    field: "bn254"
    max_constraints: 260000
    timeout_seconds: 300
    build_dir_base: "./build/zk0d"
    strict_backend: true
    evidence_mode: true

inputs:
  - name: "proofType"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
      - "3"
  - name: "requestID"
    type: "field"
    fuzz_strategy: "random"
  - name: "userGenesisID"
    type: "field"
    fuzz_strategy: "random"
  - name: "profileNonce"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
  - name: "claimSubjectProfileNonce"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
  - name: "issuerID"
    type: "field"
    fuzz_strategy: "random"
  - name: "isRevocationChecked"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
  - name: "issuerClaimNonRevMtpNoAux"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
  - name: "issuerAuthClaimNonRevMtpNoAux"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
  - name: "claimPathMtpNoAux"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
  - name: "timestamp"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "4294967295"
      - "18446744073709551615"
  - name: "claimSchema"
    type: "field"
    fuzz_strategy: "random"
  - name: "slotIndex"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
      - "3"
  - name: "operator"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
  - name: "valueArraySize"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "32"
      - "64"
      - "65"
  - name: "verifierID"
    type: "field"
    fuzz_strategy: "random"
  - name: "nullifierSessionID"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
  - name: "linkNonce"
    type: "field"
    fuzz_strategy: "random"
  - name: "value"
    type: "array<field>"
    length: 64
    fuzz_strategy: "random"
  - name: "issuerClaim"
    type: "array<field>"
    length: 8
    fuzz_strategy: "random"
  - name: "issuerAuthClaim"
    type: "array<field>"
    length: 8
    fuzz_strategy: "random"

invariants:
  - name: "proof_type_allowed"
    invariant_type: "range"
    relation: "proofType in {1,2}"
    oracle: "must_hold"
    severity: "high"
    description: "Only signature (1) and MTP (2) proof types are valid."
  - name: "revocation_flag_binary"
    invariant_type: "range"
    relation: "isRevocationChecked in {0,1}"
    oracle: "must_hold"
    severity: "high"
    description: "Revocation check selector must be binary."
  - name: "issuer_nonrev_noaux_binary"
    invariant_type: "range"
    relation: "issuerClaimNonRevMtpNoAux in {0,1}"
    oracle: "must_hold"
    severity: "high"
    description: "Issuer non-rev aux selector must be binary."
  - name: "issuer_auth_nonrev_noaux_binary"
    invariant_type: "range"
    relation: "issuerAuthClaimNonRevMtpNoAux in {0,1}"
    oracle: "must_hold"
    severity: "high"
    description: "Issuer auth non-rev aux selector must be binary."
  - name: "claim_path_noaux_binary"
    invariant_type: "range"
    relation: "claimPathMtpNoAux in {0,1}"
    oracle: "must_hold"
    severity: "high"
    description: "Claim path aux selector must be binary."
  - name: "value_array_size_lower_bound"
    invariant_type: "range"
    relation: "0 <= valueArraySize"
    oracle: "must_hold"
    severity: "medium"
    description: "Array size must be non-negative."
  - name: "value_array_size_upper_bound"
    invariant_type: "range"
    relation: "valueArraySize <= 64"
    oracle: "must_hold"
    severity: "high"
    description: "Value array size must not exceed configured maximum."
  - name: "nullifier_scope_uniqueness"
    invariant_type: "uniqueness"
    relation: "unique(nullifierSessionID) for each (userGenesisID, verifierID)"
    oracle: "must_hold"
    severity: "medium"
    description: "Session nullifier should avoid repeated values per user/verifier scope."

reporting:
  output_dir: "./reports/zk0d/skimmer/credentialAtomicQueryV3OffChain_mode2"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
