---
includes:
  - "../templates/attacks/evidence_core.yaml"

campaign:
  name: "zk0d_claimUtils_getClaimHeader_mode2"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "./targets/zk0d/wrappers/claimUtils_getClaimHeader_wrapper.circom"
    main_component: "getClaimHeader"
  parameters:
    field: "bn254"
    max_constraints: 120000
    timeout_seconds: 180
    build_dir_base: "./build/zk0d"
    strict_backend: true
    evidence_mode: true

inputs:
  - name: "claim_0"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "340282366920938463463374607431768211455"
  - name: "claim_1"
    type: "field"
    fuzz_strategy: "random"
  - name: "claim_2"
    type: "field"
    fuzz_strategy: "random"
  - name: "claim_3"
    type: "field"
    fuzz_strategy: "random"
  - name: "claim_4"
    type: "field"
    fuzz_strategy: "random"
  - name: "claim_5"
    type: "field"
    fuzz_strategy: "random"
  - name: "claim_6"
    type: "field"
    fuzz_strategy: "random"
  - name: "claim_7"
    type: "field"
    fuzz_strategy: "random"

invariants:
  - name: "claim0_field_element"
    invariant_type: "range"
    relation: "0 <= claim_0"
    oracle: "must_hold"
    severity: "medium"
    description: "Claim header word must remain in field range."
  - name: "claim4_field_element"
    invariant_type: "range"
    relation: "0 <= claim_4"
    oracle: "must_hold"
    severity: "low"
    description: "Auxiliary claim word must remain in field range."

reporting:
  output_dir: "./reports/zk0d/skimmer/claimUtils_getClaimHeader_mode2"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
