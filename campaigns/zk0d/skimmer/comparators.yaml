---
includes:
  - "../templates/attacks/evidence_core.yaml"

campaign:
  name: "zk0d_comparators_mode2"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "./targets/zk0d/wrappers/comparators_wrapper.circom"
    main_component: "LessThan254"
  parameters:
    field: "bn254"
    max_constraints: 60000
    timeout_seconds: 180
    build_dir_base: "./build/zk0d"
    strict_backend: true
    evidence_mode: true

inputs:
  - name: "in_0"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "21888242871839275222246405745257275088548364400416034343698204186575808495616"
  - name: "in_1"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "21888242871839275222246405745257275088548364400416034343698204186575808495616"

invariants:
  - name: "left_input_field_element"
    invariant_type: "range"
    relation: "0 <= in_0"
    oracle: "must_hold"
    severity: "medium"
    description: "Comparator left operand should stay within field."
  - name: "right_input_field_element"
    invariant_type: "range"
    relation: "0 <= in_1"
    oracle: "must_hold"
    severity: "medium"
    description: "Comparator right operand should stay within field."

reporting:
  output_dir: "./reports/zk0d/skimmer/comparators_mode2"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
