---
includes:
  - "templates/attacks/evidence_core.yaml"

campaign:
  name: "zk0d_semaphore_mode3_deeper"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "campaigns/zk0d/semaphore_main.circom"
    main_component: "main"
  parameters:
    field: "bn254"
    max_constraints: 15896
    timeout_seconds: 300
    build_dir_base: "./build/zk0d/semaphore"
    additional:
      strict_backend: true
      evidence_mode: true
      chain_budget_seconds: 1800
      chain_iterations: 100000

chains:
  - name: "semaphore_scope_replay_chain"
    description: "Replay identical secret/scope, then change scope to test nullifier evolution."
    circuits:
      semaphore:
        path: "campaigns/zk0d/semaphore_main.circom"
        main_component: "main"
        framework: "circom"
    steps:
      - circuit_ref: "semaphore"
        input_wiring:
          constant:
            values:
              0: "0x1"      # secret
              1: "0x14"     # merkleProofLength = 20
              2: "0x0"      # merkleProofIndex
              23: "0x1111"  # message
              24: "0xaaaa"  # scope
        label: "Baseline proof"
      - circuit_ref: "semaphore"
        input_wiring:
          constant:
            values:
              0: "0x1"
              1: "0x14"
              2: "0x0"
              23: "0x1111"
              24: "0xaaaa"
        label: "Replay same secret/scope"
      - circuit_ref: "semaphore"
        input_wiring:
          constant:
            values:
              0: "0x1"
              1: "0x14"
              2: "0x0"
              23: "0x1111"
              24: "0xbbbb"
        label: "Scope changed"
    assertions:
      - name: "same_scope_same_nullifier"
        relation: "step[0].out[1] == step[1].out[1]"
        severity: "critical"
        description: "Nullifier must be deterministic for identical (secret, scope)."
      - name: "scope_change_changes_nullifier"
        relation: "step[1].out[1] != step[2].out[1]"
        severity: "critical"
        description: "Changing scope with fixed secret must change nullifier."
      - name: "scope_replayed_between_0_1"
        relation: "step[0].in[24] == step[1].in[24]"
        severity: "high"
        description: "Step 1 intentionally replays scope from step 0."
      - name: "scope_differs_in_step2"
        relation: "step[1].in[24] != step[2].in[24]"
        severity: "high"
        description: "Step 2 intentionally mutates scope."

reporting:
  output_dir: "./reports/zk0d/semaphore_mode3_deeper"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
