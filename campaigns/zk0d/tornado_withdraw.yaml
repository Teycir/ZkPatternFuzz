# Target traits (helps auto metamorphic relations)
target_traits:
  uses_merkle: true
  uses_nullifier: true
  uses_commitment: true
  hash_function: "pedersen"
  range_checks: ["bitlen:248"]

# Evidence invariants (manual)
invariants:
  - name: "nullifier_range"
    invariant_type: range
    relation: "0 <= nullifier < 2^248"
    oracle: must_hold
    severity: "critical"
    description: "Nullifier must fit in 248 bits"

  - name: "secret_range"
    invariant_type: range
    relation: "0 <= secret < 2^248"
    oracle: must_hold
    severity: "critical"
    description: "Secret must fit in 248 bits"
  - name: "path_index_binary_0"
    invariant_type: constraint
    relation: "pathIndices_0 in {0,1}"
    oracle: must_hold
    severity: "critical"
    description: "Merkle path index must be binary"

  - name: "path_index_binary_1"
