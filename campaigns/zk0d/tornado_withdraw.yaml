---
campaign:
  name: "zk0d_tornado_withdraw"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "third_party/tornado-core/circuits/withdraw.circom"
    main_component: "Withdraw"
  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 300
    build_dir_base: "./build/zk0d"

# Evidence-mode attack set
attacks:
  - type: "constraint_inference"
    description: "Detect missing constraints with confirmation"
    config:
      confidence_threshold: 0.7
      confirm_violations: true

  - type: "constraint_slice"
    description: "Cone-based dependency slicing"
    config:
      samples_per_cone: 10
      base_witness_attempts: 10

  - type: "metamorphic"
    description: "Transform-based invariants"
    config:
      num_tests: 100

  - type: "witness_collision"
    description: "Detect distinct witnesses with same public outputs"
    config:
      samples: 100
      scope_public_inputs: true

  - type: "boundary"
    description: "Boundary value testing"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"

# Inputs (fully flattened to match circom signal order)
inputs:
  - name: "root"
    type: "field"
    fuzz_strategy: "random"

  - name: "nullifierHash"
    type: "field"
    fuzz_strategy: "random"

