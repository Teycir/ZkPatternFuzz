---
# Range invariants for 248-bit nullifier/secret
invariants:
  - name: "nullifier_range"
    invariant_type: range
    relation: "0 <= nullifier < 2^248"
    oracle: must_hold
    severity: "critical"
    description: "Nullifier must fit in 248 bits"

  - name: "secret_range"
    invariant_type: range
    relation: "0 <= secret < 2^248"
    oracle: must_hold
    severity: "critical"
    description: "Secret must fit in 248 bits"
