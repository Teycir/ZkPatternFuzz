---
campaign:
  name: "zk0d_iden3_authv3_mode3"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/authV3-8-32.circom"
    main_component: "AuthV3"
  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 300
    build_dir_base: "./build/zk0d"
    strict_backend: true
    evidence_mode: true
    chain_budget_seconds: 300
    chain_iterations: 1000

chains:
  - name: "authv3_userid_chain"
    description: "Propagate userID across steps to validate multi-step wiring"
    circuits:
      authv3:
        path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/authV3-8-32.circom"
        main_component: "AuthV3"
        framework: "circom"
    steps:
      - circuit_ref: "authv3"
        input_wiring: !fresh
        label: "Seed auth"
      - circuit_ref: "authv3"
        input_wiring: !from_prior_output
          step: 0
          mapping:
            - [0, 0]  # userID -> challenge
        label: "Reuse userID as challenge"
      - circuit_ref: "authv3"
        input_wiring: !from_prior_output
          step: 1
          mapping:
            - [0, 0]
        label: "Propagate again"
    assertions:
      - name: "wire_0_to_1"
        relation: "step[0].out[0] == step[1].in[0]"
        severity: "high"
        description: "Step 1 must receive step 0 output in input 0"
      - name: "wire_1_to_2"
        relation: "step[1].out[0] == step[2].in[0]"
        severity: "high"
        description: "Step 2 must receive step 1 output in input 0"

reporting:
  output_dir: "./reports/zk0d/iden3_authv3_mode3"
  formats:
    - "json"
    - "markdown"
  include_poc: true
  crash_reproduction: true
