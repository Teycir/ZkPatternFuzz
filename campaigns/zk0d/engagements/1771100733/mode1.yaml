---
# Mode 1 (Fast Skimmer) campaign for credentialAtomicQueryV3-16-16-64.
# Inputs are flattened scalars in the exact Circom top-level order (public first, then private),
# derived from the compiled .sym (6 outputs, 77 public inputs, 124 private inputs).

campaign:
  name: "zk0d_credentialAtomicQueryV3_16_16_64_mode1_skimmer_eng_1771100733"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/circuits/circuits/credentialAtomicQueryV3-16-16-64.circom"
    main_component: "main"
  parameters:
    field: "bn254"
    max_constraints: 120000
    timeout_seconds: 300
    # Build artifacts are written to the global build cache (outside the report folder).
    seed_inputs_path: "campaigns/zk0d/credentialAtomicQueryV3_seed_inputs.json"

    # Backend behavior (NOTE: campaign.parameters uses a flattened key/value map; do not nest under
    # an `additional:` key or the engine will ignore these settings).
    strict_backend: true
    evidence_mode: false
    oracle_validation: false

    # Deep run: favor robustness over raw throughput.
    per_exec_isolation: true

    # Circom backend
    circom_skip_compile_if_artifacts: true
    circom_skip_constraint_check: false
    circom_auto_setup_keys: false

    # Deep run: enable guided exploration to reduce blind spots.
    symbolic_enabled: true
    constraint_guided_enabled: true

invariants:
  - name: "proof_type_nonzero"
    invariant_type: constraint
    relation: "proofType != 0"
    oracle: must_hold
    severity: "high"
    description: "proofType should not be zero for valid query proofs."
  - name: "proof_type_upper_bound"
    invariant_type: range
    relation: "proofType < 3"
    oracle: must_hold
    severity: "high"
    description: "proofType must be in supported domain (signature/MTP selector family)."
  - name: "revocation_flag_binary"
    invariant_type: range
    relation: "isRevocationChecked < 2"
    oracle: must_hold
    severity: "high"
    description: "Revocation check selector must be binary."
  - name: "issuer_nonrev_noaux_binary"
    invariant_type: range
    relation: "issuerClaimNonRevMtpNoAux < 2"
    oracle: must_hold
    severity: "high"
    description: "Issuer non-rev aux selector must be binary."
  - name: "issuer_auth_nonrev_noaux_binary"
    invariant_type: range
    relation: "issuerAuthClaimNonRevMtpNoAux < 2"
    oracle: must_hold
    severity: "high"
    description: "Issuer auth non-rev aux selector must be binary."
  - name: "claim_path_noaux_binary"
    invariant_type: range
    relation: "claimPathMtpNoAux < 2"
    oracle: must_hold
    severity: "high"
    description: "Claim path aux selector must be binary."
  - name: "value_array_size_upper_bound"
    invariant_type: range
    relation: "valueArraySize <= 64"
    oracle: must_hold
    severity: "high"
    description: "valueArraySize must stay within configured circuit bound."
  - name: "nullifier_scope_uniqueness"
    invariant_type: uniqueness
    relation: "unique(nullifierSessionID) for each (userGenesisID, verifierID)"
    oracle: must_hold
    severity: "medium"
    description: "Session nullifier should avoid repeated values per user/verifier scope."

attacks:
  - type: "underconstrained"
    description: "Fast skim for missing constraints."
    config:
      witness_pairs: 1200
  - type: "witness_collision"
    description: "Fast collision skim for same-public-output witnesses."
    config:
      samples: 120
      scope_public_inputs: true
  - type: "constraint_inference"
    description: "Quick semantic constraint inference pass."
    config:
      confidence_threshold: 0.75
      confirm_violations: false
  - type: "boundary"
    description: "Quick boundary values."
    config:
      test_values:
        - "0"
        - "1"
        - "2"
        - "p-1"

