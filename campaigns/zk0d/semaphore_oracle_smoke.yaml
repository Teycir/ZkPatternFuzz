---
# Phase 4A: Production Evidence Campaign for Semaphore
# Fixed from smoke test to production-ready 0-day configuration
includes:
  - "semaphore_repo.yaml"

campaign:
  name: "Semaphore Evidence Campaign"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "/media/elements/Repos/zk0d/cat3_privacy/semaphore/circuits/semaphore.circom"
    main_component: "Semaphore"
  parameters:
    field: "bn254"
    max_constraints: 100000
    timeout_seconds: 1800  # 30 minutes for thorough testing
    additional:
      # Backend settings
      strict_backend: true
      per_exec_isolation: true
      execution_timeout_ms: 30000

      # Symbolic execution - deep exploration
      constraint_guided_enabled: true
      symbolic_max_paths: 1000
      symbolic_max_depth: 200
      symbolic_solver_timeout_ms: 5000

      # Corpus management
      corpus_max_size: 100000

      # Oracle configuration
      enabled_oracles:
        - "underconstrained_oracle"
        - "nullifier_oracle"
        - "merkle_oracle"
        - "constraint_inference_oracle"
      oracle_validation: true
      oracle_validation_skip_stateful: false
      oracle_validation_allow_cross_attack: true
      oracle_validation_cross_attack_weight: 0.5
      oracle_validation_reset_stateful: true

      # Circom-specific
      circom_auto_setup_keys: true
      circom_ptau_path: "./build/zk0d/semaphore/pot14_final.ptau"
      circom_snarkjs_path: "/media/elements/Repos/zk0d/cat3_privacy/semaphore/node_modules/snarkjs/build/cli.cjs"
      include_paths:
        - "/media/elements/Repos/zk0d/cat3_privacy/semaphore/node_modules"

      # Fuzzing parameters
      fuzzing_iterations: 50000
      seed_inputs_path: "campaigns/zk0d/semaphore_seed_inputs.json"

invariants:
  - name: "secret_range"
    invariant_type: range
    relation: "0 <= secret < 2736030358979909402780800718157159386076813972158567259200215660948447373041"
    oracle: must_hold
    severity: "critical"
    description: "Secret must be less than Baby Jubjub subgroup order l"

  - name: "nullifier_unique"
    invariant_type: uniqueness
    relation: "unique(nullifier) for each (scope, secret)"
    oracle: must_hold
    severity: "critical"
    description: "Different (scope, secret) pairs must produce different nullifiers"

  - name: "merkle_length_bounds"
    invariant_type: range
    relation: "0 <= merkleProofLength <= 20"
    oracle: must_hold
    severity: "high"
    description: "Merkle proof length must not exceed tree depth (Semaphore(20))"

  - name: "merkle_index_bounds"
    invariant_type: range
    relation: "merkleProofIndex < 2^merkleProofLength"
    oracle: must_hold
    severity: "high"
    description: "Merkle proof index must fit within tree size"

  - name: "identity_commitment_deterministic"
    invariant_type: constraint
    relation: "identityCommitment = Poseidon(Ax, Ay) where (Ax, Ay) = BabyPbk(secret)"
    oracle: must_hold
    severity: "critical"
    description: "Identity commitment must be deterministically derived from secret"

  - name: "merkle_root_valid"
    invariant_type: constraint
    relation: "merkleRoot = BinaryMerkleRoot(commitment, length, index, siblings)"
    oracle: must_hold
    severity: "critical"
    description: "Merkle root must be correctly computed from proof"

attacks:
  - type: "soundness"
    description: "Attempt to create valid proofs for false statements"
    config:
      forge_attempts: 1000
      mutation_rate: 0.25

  - type: "underconstrained"
    description: "Find inputs that satisfy constraints but produce wrong outputs"
    config:
      witness_pairs: 5000
      tolerance: 0.0001

  - type: "boundary"
    description: "Test field arithmetic edge cases"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "2736030358979909402780800718157159386076813972158567259200215660948447373040"  # l-1

  - type: "collision"
    description: "Detect nullifier or commitment collisions"
    config:
      samples: 10000

inputs:
  - name: "secret"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
      - "0x2736030358979909402780800718157159386076813972158567259200215660948447373040"

  - name: "merkleProofLength"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0"
      - "1"
      - "20"
      - "21"

  - name: "merkleProofIndex"
    type: "field"
    fuzz_strategy: random

  - name: "merkleProofSiblings"
    type: "array[field]"
    length: 20
    fuzz_strategy: random

  - name: "scope"
    type: "field"
    fuzz_strategy: random

  - name: "message"
    type: "field"
    fuzz_strategy: random

reporting:
  output_dir: "./reports/semaphore_evidence"
  formats:
    - json
    - markdown
  include_poc: true
  crash_reproduction: true
