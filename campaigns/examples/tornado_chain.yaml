# Tornado Cash Chain Fuzzing Campaign
#
# Mode 3: Multi-step chain fuzzing for Tornado Cash protocol
#
# This campaign tests the complete deposit → withdraw flow for:
# - Nullifier uniqueness (double-spend prevention)
# - Root consistency (Merkle tree integrity)
# - Commitment binding (deposit-withdraw linkage)
#
# Usage:
#   cargo run --release -- chains campaigns/examples/tornado_chain.yaml \
#     --iterations 50000 --timeout 1800 --seed 42
#
# Prerequisites:
#   - Clone tornado-core: git clone https://github.com/tornadocash/tornado-core
#   - Compile circuits: cd tornado-core && npm install && npm run build
#   - Update circuit_path below to point to your compiled circuits

campaign:
  name: "Tornado Cash Chain Audit"
  version: "1.0"
  target:
    framework: circom
    # Update this path to your tornado-core installation
    circuit_path: "/path/to/tornado-core/circuits/withdraw.circom"
    main_component: "Withdraw"

  parameters:
    field: "bn254"
    max_constraints: 100000
    timeout_seconds: 1800
    additional:
      strict_backend: true
      evidence_mode: true
      chain_budget_seconds: 600
      chain_iterations: 10000

# =============================================================================
# Chain Specifications
# =============================================================================

chains:
  # Primary chain: Test double-spend prevention
  - name: "double_withdraw_attempt"
    description: "Attempt to use the same nullifier for two withdrawals"
    circuits:
      withdraw:
        path: "./circuits/withdraw.circom"
        main_component: "Withdraw"
    steps:
      - circuit_ref: "withdraw"
        input_wiring: fresh
        label: "First withdrawal (legitimate)"
      - circuit_ref: "withdraw"
        input_wiring:
          mixed:
            # Reuse nullifier from first withdrawal
            prior:
              - [0, 0, 0]   # step 0, output 0 (nullifierHash) → input 0
            # Fresh values for other inputs
            fresh_indices: [1, 2, 3, 4, 5, 6, 7]
        label: "Second withdrawal (reusing nullifier)"
    assertions:
      - name: "no_nullifier_reuse"
        relation: "step[1].success == false"
        severity: "critical"
        description: "Second withdrawal with same nullifier must fail verification"

  # Secondary chain: Test root consistency
  - name: "root_consistency_check"
    description: "Verify Merkle root is correctly passed between operations"
    circuits:
      withdraw:
        path: "./circuits/withdraw.circom"
        main_component: "Withdraw"
    steps:
      - circuit_ref: "withdraw"
        input_wiring: fresh
        label: "Withdrawal with valid root"
      - circuit_ref: "withdraw"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [1, 1]   # root output → root input
        label: "Withdrawal with propagated root"
    assertions:
      - name: "root_propagation"
        relation: "step[0].out[1] == step[1].in[1]"
        severity: "high"
        description: "Root must be correctly passed between withdrawals"

  # Triple withdrawal chain for deeper bugs
  - name: "triple_withdraw_nullifier_tracking"
    description: "Three-step withdrawal chain to test nullifier tracking"
    circuits:
      withdraw:
        path: "./circuits/withdraw.circom"
        main_component: "Withdraw"
    steps:
      - circuit_ref: "withdraw"
        input_wiring: fresh
        label: "First withdrawal"
      - circuit_ref: "withdraw"
        input_wiring: fresh
        label: "Second withdrawal (new nullifier)"
      - circuit_ref: "withdraw"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [0, 0]   # Attempt reuse from step 0
        label: "Third withdrawal (reusing first nullifier)"
    assertions:
      - name: "all_nullifiers_unique"
        relation: "unique(step[*].out[0])"
        severity: "critical"
        description: "All nullifiers must be unique across chain"
      - name: "third_must_fail"
        relation: "step[2].success == false"
        severity: "critical"
        description: "Third withdrawal reusing first nullifier must fail"

  # Edge case: Zero-value withdrawal
  - name: "zero_value_edge_case"
    description: "Test zero-value withdrawal handling"
    circuits:
      withdraw:
        path: "./circuits/withdraw.circom"
        main_component: "Withdraw"
    steps:
      - circuit_ref: "withdraw"
        input_wiring:
          constant:
            values:
              3: "0x0"    # Zero relayer fee
              4: "0x0"    # Zero recipient amount (edge case)
            fresh_indices: [0, 1, 2, 5, 6, 7]
        label: "Zero-value withdrawal attempt"
    assertions:
      - name: "zero_value_handling"
        relation: "step[0].success == true"
        severity: "medium"
        description: "Zero-value withdrawals should be handled gracefully"

# =============================================================================
# Standard Invariants (single-step checking)
# =============================================================================

invariants:
  - name: "nullifier_uniqueness"
    invariant_type: uniqueness
    relation: "unique(nullifierHash) for each (secret, nullifier)"
    severity: "critical"
    description: "Each nullifier must be unique per commitment"

  - name: "path_indices_binary"
    invariant_type: range
    relation: "pathIndices[i] in {0, 1}"
    severity: "high"
    description: "Merkle path indices must be binary"

  - name: "merkle_root_consistency"
    invariant_type: equality
    relation: "computedRoot == providedRoot"
    severity: "critical"
    description: "Computed Merkle root must match provided root"

# =============================================================================
# Attack Configuration
# =============================================================================

attacks:
  - type: underconstrained
    description: "Find multiple valid witnesses for same nullifier"
    config:
      witness_pairs: 5000
      public_input_count: 2

  - type: soundness
    description: "Attempt to create proofs for invalid withdrawals"
    config:
      forge_attempts: 2000
      mutation_rate: 0.15

  - type: collision
    description: "Detect nullifier collisions"
    config:
      samples: 10000

  - type: arithmetic_overflow
    description: "Test field arithmetic edge cases"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "2^253"

  - type: witness_collision
    description: "Find different witnesses producing same outputs"
    config:
      witness_count: 5000
      public_indices: [0, 1]

# =============================================================================
# Input Definitions
# =============================================================================

inputs:
  - name: "nullifierHash"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"

  - name: "root"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"

  - name: "recipient"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0xdead"
      - "0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF"

  - name: "relayer"
    type: "field"
    fuzz_strategy: random

  - name: "fee"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
      - "0xFFFFFFFFFFFFFFFF"

  - name: "secret"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"

  - name: "nullifier"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"

  - name: "pathElements"
    type: "field[]"
    length: 20
    fuzz_strategy: random

  - name: "pathIndices"
    type: "field[]"
    length: 20
    fuzz_strategy: random
    constraints:
      - "binary"

# =============================================================================
# Reporting Configuration
# =============================================================================

reporting:
  output_dir: "./reports/tornado_chain"
  formats:
    - json
    - markdown
  include_poc: true
  crash_reproduction: true

# =============================================================================
# Schedule (Phased Execution)
# =============================================================================

schedule:
  - phase: "seed"
    duration_sec: 60
    attacks: ["underconstrained"]
    early_terminate:
      on_critical_findings: 2

  - phase: "chain_focus"
    duration_sec: 300
    attacks: ["underconstrained", "witness_collision"]
    carry_corpus: true

  - phase: "edge_cases"
    duration_sec: 120
    attacks: ["arithmetic_overflow", "soundness"]
    carry_corpus: true
