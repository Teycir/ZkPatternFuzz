campaign:
  name: "DeFi Attack Surface Audit"
  version: "1.0"
  target:
    framework: "circom"
    circuit_path: "./circuits/defi_pool.circom"
    main_component: "Main"
  parameters:
    field: "bn254"
    max_constraints: 100000
    timeout_seconds: 300

attacks:
  - type: "defi_advanced"
    description: "MEV and front-running composite analysis"
    config:
      defi_advanced:
        mev_patterns:
          ordering_permutations: 12
          sandwich_attempts: 8
          detect_ordering: true
          detect_sandwich: true
          detect_leakage: true
        front_running_patterns:
          leakage_tests: 100
          commitment_tests: 100
          detect_leakage: true
          detect_commitment_bypass: true
          detect_delay_attack: true

inputs:
  - name: "input_0"
    type: "field"
    fuzz_strategy: "random"

