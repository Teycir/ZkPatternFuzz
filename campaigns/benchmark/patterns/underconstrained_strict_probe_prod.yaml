invariants:
  - name: field_input_domain
    invariant_type: range
    relation: "0 <= input_0"
    oracle: must_hold
    severity: low
    description: "Baseline domain guard for strict evidence runs"

attacks:
  - type: underconstrained
    description: "Primary underconstraint discovery sweep"
    config:
      witness_pairs: 2500

  - type: soundness
    description: "Proof/verification soundness checks required by strict readiness"
    config:
      forge_attempts: 256
      mutation_rate: 0.15

  - type: constraint_inference
    description: "Infer likely missing semantic constraints"
    config:
      confidence_threshold: 0.60
      confirm_violations: true

  - type: metamorphic
    description: "Transform-based semantic consistency checks"
    config:
      num_tests: 96

  - type: constraint_slice
    description: "Cone-based dependency slice probing"
    config:
      samples_per_cone: 8
      base_witness_attempts: 32

  - type: spec_inference
    description: "Infer IO-level rules and probe violations"
    config:
      sample_count: 128

  - type: witness_collision
    description: "Search for distinct witnesses mapping to equivalent public behavior"
    config:
      samples: 192
      scope_public_inputs: true

  - type: boundary
    description: "Boundary-value probing with field edges"
    config:
      test_values: ["0", "1", "2", "3", "31", "32", "63", "64", "p-1"]

inputs:
  - name: input_0
    type: field
    fuzz_strategy: random
    interesting: ["0", "1", "p-1"]

  - name: input_1
    type: field
    fuzz_strategy: random
    interesting: ["0", "1", "2"]
