# zk0d Validation: iden3 StateTransitionV3

campaign:
  name: "zk0d iden3 StateTransitionV3 Validation"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "/media/elements/Repos/zk0d/cat3_privacy/circuits/circuits/stateTransitionV3.circom"
    main_component: "StateTransitionV3"

  parameters:
    field: "bn254"
    max_constraints: 300000
    timeout_seconds: 1800
    max_iterations: 5000
    strict_backend: true
    oracle_validation: true
    build_dir_base: "./.zkfuzz_build"
    circom_skip_compile_if_artifacts: true
    timeout_per_execution: 15
    constraint_guided_enabled: true
    constraint_guided_max_depth: 80
    constraint_guided_max_paths: 20
    constraint_guided_solver_timeout_ms: 1000
    constraint_guided_solutions_per_path: 1

attacks:
  - type: "underconstrained"
    description: "Check for missing constraints in state transition logic"
    config:
      witness_pairs: 100
      public_input_names:
        - "userID"
        - "oldUserState"
        - "newUserState"
        - "isOldStateGenesis"

  - type: "boundary"
    description: "Boundary testing for identity/state inputs"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "(p-1)/2"

  - type: "constraint_inference"
    description: "Infer missing constraints around Merkle/SMT proofs"
    config:
      categories:
        - "merkle_path"
        - "signature"
        - "smt"

inputs:
  - name: "userID"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "oldUserState"
    type: "field"
    fuzz_strategy: "random"

  - name: "newUserState"
    type: "field"
    fuzz_strategy: "random"

  - name: "isOldStateGenesis"
    type: "field"
    constraints:
      - "binary"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

  - name: "claimsTreeRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "authClaimMtp"
    type: "array<field>"
    length: 40
    fuzz_strategy: "mutation"

  - name: "authClaim"
    type: "array<field>"
    length: 8
    fuzz_strategy: "mutation"

  - name: "revTreeRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "authClaimNonRevMtp"
    type: "array<field>"
    length: 40
    fuzz_strategy: "mutation"

  - name: "authClaimNonRevMtpNoAux"
    type: "field"
    fuzz_strategy: "random"

  - name: "authClaimNonRevMtpAuxHv"
    type: "field"
    fuzz_strategy: "random"

  - name: "authClaimNonRevMtpAuxHi"
    type: "field"
    fuzz_strategy: "random"

  - name: "rootsTreeRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "signatureR8x"
    type: "field"
    fuzz_strategy: "mutation"

  - name: "signatureR8y"
    type: "field"
    fuzz_strategy: "mutation"

  - name: "signatureS"
    type: "field"
    fuzz_strategy: "mutation"

  - name: "newClaimsTreeRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "newAuthClaimMtp"
    type: "array<field>"
    length: 40
    fuzz_strategy: "mutation"

  - name: "newRevTreeRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "newRootsTreeRoot"
    type: "field"
    fuzz_strategy: "random"

mutations:
  - name: "bit_flip"
    probability: 0.25

  - name: "arithmetic"
    operations: ["add_one", "sub_one", "negate"]
    probability: 0.2

  - name: "havoc"
    probability: 0.1
    max_stacked_mutations: 3

reporting:
  output_dir: "./reports/zk0d_validation/iden3/state_transition_v3_deep"
  formats: ["json", "markdown"]
  include_poc: true
  crash_reproduction: true

invariants:
  - name: "user_id_self_consistency"
    invariant_type: "constraint"
    relation: "userID == userID"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: userID remains self-consistent"

  - name: "state_self_consistency"
    invariant_type: "constraint"
    relation: "oldUserState == oldUserState"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: oldUserState remains self-consistent"
