# zk0d Validation: iden3 AuthV3
---
campaign:
  name: "zk0d iden3 AuthV3 Validation"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "/media/elements/Repos/zk0d/cat3_privacy/circuits/circuits/authV3.circom"
    main_component: "AuthV3"

  parameters:
    field: "bn254"
    max_constraints: 300000
    timeout_seconds: 300
    max_iterations: 50
    strict_backend: true
    oracle_validation: true
    build_dir_base: "./.zkfuzz_build"
    circom_skip_compile_if_artifacts: true
    timeout_per_execution: 10

attacks:
  - type: "underconstrained"
    description: "Check for missing constraints in auth flow and SMT checks"
    config:
      witness_pairs: 1
      public_input_names:
        - "challenge"
        - "gistRoot"

  - type: "boundary"
    description: "Boundary testing for identity/auth inputs"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "(p-1)/2"

inputs:
  - name: "genesisID"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2^248"

  - name: "profileNonce"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

  - name: "state"
    type: "field"
    fuzz_strategy: "random"

  - name: "claimsTreeRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "revTreeRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "rootsTreeRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "authClaim"
    type: "array<field>"
    length: 8
    fuzz_strategy: "mutation"

  - name: "authClaimIncMtp"
    type: "array<field>"
    length: 40
    fuzz_strategy: "mutation"

  - name: "authClaimNonRevMtp"
    type: "array<field>"
    length: 40
    fuzz_strategy: "mutation"

  - name: "authClaimNonRevMtpNoAux"
    type: "field"
    constraints:
      - "binary"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

  - name: "authClaimNonRevMtpAuxHi"
    type: "field"
    fuzz_strategy: "random"

  - name: "authClaimNonRevMtpAuxHv"
    type: "field"
    fuzz_strategy: "random"

  - name: "challenge"
    type: "field"
    fuzz_strategy: "random"

  - name: "challengeSignatureR8x"
    type: "field"
    fuzz_strategy: "mutation"

  - name: "challengeSignatureR8y"
    type: "field"
    fuzz_strategy: "mutation"

  - name: "challengeSignatureS"
    type: "field"
    fuzz_strategy: "mutation"

  - name: "gistRoot"
    type: "field"
    fuzz_strategy: "random"

  - name: "gistMtp"
    type: "array<field>"
    length: 64
    fuzz_strategy: "mutation"

  - name: "gistMtpAuxHi"
    type: "field"
    fuzz_strategy: "random"

  - name: "gistMtpAuxHv"
    type: "field"
    fuzz_strategy: "random"

  - name: "gistMtpNoAux"
    type: "field"
    constraints:
      - "binary"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

mutations:
  - name: "bit_flip"
    probability: 0.25

  - name: "arithmetic"
    operations: ["add_one", "sub_one", "negate"]
    probability: 0.2

  - name: "havoc"
    probability: 0.1
    max_stacked_mutations: 3

reporting:
  output_dir: "./reports/zk0d_validation/iden3/auth_v3"
  formats: ["json", "markdown"]
  include_poc: true
  crash_reproduction: true

invariants:
  - name: "genesis_id_self_consistency"
    invariant_type: "constraint"
    relation: "genesisID == genesisID"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: genesisID remains self-consistent"

  - name: "state_self_consistency"
    invariant_type: "constraint"
    relation: "state == state"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: state remains self-consistent"
