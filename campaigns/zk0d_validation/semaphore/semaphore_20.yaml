# zk0d Validation: Semaphore (Depth 20)
---
campaign:
  name: "zk0d Semaphore Validation"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "./targets/zk0d/semaphore_20.circom"
    main_component: "Semaphore"

  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 300
    additional:
      strict_backend: true

attacks:
  - type: "underconstrained"
    description: "Check for missing constraints in membership and nullifier"
    config:
      witness_pairs: 2000

  - type: "collision"
    description: "Attempt nullifier collisions"
    config:
      samples: 20000
      target_output: "nullifier"

  - type: "constraint_inference"
    description: "Infer missing constraints in Merkle proof and nullifier"
    config:
      categories:
        - "merkle_path"
        - "nullifier"

inputs:
  - name: "secret"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "merkleProofLength"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "20"

  - name: "merkleProofIndex"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "2"
      - "2^20-1"

  - name: "merkleProofSiblings"
    type: "array<field>"
    length: 20
    fuzz_strategy: "mutation"

  - name: "message"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x0"
      - "0x1"
      - "0xdeadbeef"

  - name: "scope"
    type: "field"
    fuzz_strategy: "random"

mutations:
  - name: "bit_flip"
    probability: 0.25

  - name: "arithmetic"
    operations: ["add_one", "sub_one", "negate"]
    probability: 0.2

  - name: "havoc"
    probability: 0.1
    max_stacked_mutations: 3

reporting:
  output_dir: "./reports/zk0d_validation/semaphore"
  formats: ["json", "markdown"]
  include_poc: true
  crash_reproduction: true

invariants:
  - name: "secret_self_consistency"
    invariant_type: "constraint"
    relation: "secret == secret"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: secret remains self-consistent"

  - name: "scope_self_consistency"
    invariant_type: "constraint"
    relation: "scope == scope"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: scope remains self-consistent"
