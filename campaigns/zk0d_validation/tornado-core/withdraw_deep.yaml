# zk0d Validation: Tornado Core Withdraw

campaign:
  name: "zk0d Tornado-Core Withdraw Validation"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "/media/elements/Repos/zk0d/cat3_privacy/tornado-core/circuits/withdraw.circom"
    main_component: "Withdraw"

  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 1800
    max_iterations: 5000
    strict_backend: true
    oracle_validation: true
    build_dir_base: "./.zkfuzz_build"
    circom_skip_compile_if_artifacts: true
    timeout_per_execution: 15
    constraint_guided_enabled: true
    constraint_guided_max_depth: 80
    constraint_guided_max_paths: 20
    constraint_guided_solver_timeout_ms: 1000
    constraint_guided_solutions_per_path: 1

attacks:
  - type: "underconstrained"
    description: "Check for missing constraints in withdraw path"
    config:
      witness_pairs: 100
      public_input_names:
        - "root"
        - "nullifierHash"
        - "recipient"
        - "relayer"
        - "fee"
        - "refund"

  - type: "boundary"
    description: "Boundary testing for field inputs"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "(p-1)/2"

  - type: "constraint_inference"
    description: "Infer missing constraints around Merkle path and nullifier"
    config:
      categories:
        - "merkle_path"
        - "bit_decomposition"
        - "nullifier"

inputs:
  - name: "root"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "nullifierHash"
    type: "field"
    fuzz_strategy: "mutation"
    interesting:
      - "0x0"
      - "0x1"
      - "0xdeadbeef"

  - name: "recipient"
    type: "field"
    fuzz_strategy: "random"

  - name: "relayer"
    type: "field"
    fuzz_strategy: "random"

  - name: "fee"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

  - name: "refund"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

  - name: "nullifier"
    type: "field"
    fuzz_strategy: "random"

  - name: "secret"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "pathElements"
    type: "array<field>"
    length: 20
    fuzz_strategy: "mutation"

  - name: "pathIndices"
    type: "array<bool>"
    length: 20
    fuzz_strategy: "mutation"
    interesting:
      - "0"
      - "1"
      - "2"

mutations:
  - name: "bit_flip"
    probability: 0.25

  - name: "arithmetic"
    operations: ["add_one", "sub_one", "negate"]
    probability: 0.2

  - name: "havoc"
    probability: 0.1
    max_stacked_mutations: 3

reporting:
  output_dir: "./reports/zk0d_validation/tornado-core/withdraw_deep"
  formats: ["json", "markdown"]
  include_poc: true
  crash_reproduction: true

invariants:
  - name: "root_self_consistency"
    invariant_type: "constraint"
    relation: "root == root"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: root remains self-consistent"

  - name: "nullifier_hash_self_consistency"
    invariant_type: "constraint"
    relation: "nullifierHash == nullifierHash"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: nullifierHash remains self-consistent"
