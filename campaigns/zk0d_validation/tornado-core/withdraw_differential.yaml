# Mode 2: Differential Testing - Tornado Core Withdraw

campaign:
  name: "zk0d Tornado-Core Withdraw Differential"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "/media/elements/Repos/zk0d/cat3_privacy/tornado-core/circuits/withdraw.circom"
    main_component: "Withdraw"

  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 3600
    max_iterations: 10000
    strict_backend: true
    oracle_validation: true
    build_dir_base: "./.zkfuzz_build"
    circom_skip_compile_if_artifacts: true
    timeout_per_execution: 30

attacks:
  - type: "differential"
    description: "Cross-backend comparison: Circom vs Noir vs Halo2"
    config:
      backends: ["circom", "noir", "halo2"]
      test_cases: 1000
      timing_tolerance: 0.5
      coverage_jaccard_threshold: 0.5
      compare_outputs: true
      compare_timing: true
      compare_coverage: true

inputs:
  - name: "root"
    type: "field"
    fuzz_strategy: "random"

  - name: "nullifierHash"
    type: "field"
    fuzz_strategy: "random"

  - name: "recipient"
    type: "field"
    fuzz_strategy: "random"

  - name: "relayer"
    type: "field"
    fuzz_strategy: "random"

  - name: "fee"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"
      - "1000000"

  - name: "refund"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

  - name: "nullifier"
    type: "field"
    fuzz_strategy: "random"

  - name: "secret"
    type: "field"
    fuzz_strategy: "random"

  - name: "pathElements"
    type: "array<field>"
    length: 20
    fuzz_strategy: "mutation"

  - name: "pathIndices"
    type: "array<bool>"
    length: 20
    fuzz_strategy: "mutation"

reporting:
  output_dir: "./reports/zk0d_validation/tornado-core/withdraw_differential"
  formats: ["json", "markdown"]
  include_poc: true
  crash_reproduction: true
