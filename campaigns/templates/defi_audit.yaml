# DeFi Protocol Audit Template
# Phase 3: Milestone 3.1 - MEV & Front-Running Attack Detection
#
# Use this template for auditing DeFi ZK circuits including:
# - DEX/AMM swap circuits
# - Privacy mixers (Tornado Cash style)
# - Order book circuits
# - Lending protocol circuits
# - Bridge circuits
#
# Usage:
#   cargo run -- run campaigns/templates/defi_audit.yaml --profile standard
#   cargo run -- evidence campaigns/templates/defi_audit.yaml --profile deep

campaign:
  name: "DeFi Protocol Audit"
  version: "1.0"
  target:
    framework: circom  # Change to noir/halo2/cairo as needed
    circuit_path: "./circuits/swap.circom"  # Update path
    main_component: "Swap"  # Update component name
  parameters:
    field: bn254
    max_constraints: 500000
    timeout_seconds: 600
    additional:
      strict_backend: true
      evidence_mode: true
      # MEV attack configuration
      mev_ordering_permutations: 100
      mev_sandwich_attempts: 50
      mev_profit_threshold: 0.01
      # Front-running configuration
      front_running_leakage_tests: 100
      front_running_entropy_threshold: 3.0

# =============================================================================
# Attack Vectors
# =============================================================================

attacks:
  # -------------------------------------------------------------------------
  # MEV Attacks (Phase 3)
  # -------------------------------------------------------------------------
  
  - type: soundness
    description: "MEV: Ordering dependency detection"
    config:
      attack_subtype: "mev_ordering"
      ordering_permutations: 100
      samples: 1000

  - type: soundness
    description: "MEV: Sandwich attack detection"
    config:
      attack_subtype: "mev_sandwich"
      sandwich_attempts: 50
      profit_threshold: 0.01

  - type: soundness
    description: "MEV: State leakage analysis"
    config:
      attack_subtype: "mev_leakage"
      leakage_samples: 100

  # -------------------------------------------------------------------------
  # Front-Running Attacks (Phase 3)
  # -------------------------------------------------------------------------

  - type: soundness
    description: "Front-running: Information leakage"
    config:
      attack_subtype: "front_running_leakage"
      entropy_threshold: 3.0
      leakage_tests: 100

  - type: soundness
    description: "Front-running: Commitment bypass"
    config:
      attack_subtype: "front_running_commitment"
      commitment_tests: 50

  - type: soundness
    description: "Front-running: Delay attack"
    config:
      attack_subtype: "front_running_delay"
      timing_samples: 20

  # -------------------------------------------------------------------------
  # Standard Vulnerability Detection
  # -------------------------------------------------------------------------

  - type: underconstrained
    description: "Detect missing constraints that could allow invalid state transitions"
    config:
      witness_pairs: 10000
      dof_threshold: 0.1

  - type: soundness
    description: "Attempt to create valid proofs for invalid statements"
    config:
      forge_attempts: 5000
      mutation_rate: 0.2

  - type: arithmetic_overflow
    description: "Test field arithmetic edge cases and overflow conditions"
    config:
      boundary_tests: 5000
      test_values:
        - "0x0"
        - "0x1"
        - "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"

  - type: collision
    description: "Detect hash collisions or nullifier collisions"
    config:
      samples: 20000

  - type: boundary
    description: "Test range proof boundaries and edge cases"
    config:
      boundary_samples: 10000

# =============================================================================
# Input Specification
# =============================================================================

inputs:
  # Swap amount (typical DEX input)
  - name: "amount_in"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"
      - "positive"
    interesting:
      - "0x1"
      - "0xde0b6b3a7640000"  # 1e18 (1 token with 18 decimals)
      - "0x56bc75e2d63100000"  # 100e18

  # Price/exchange rate
  - name: "price"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x1"
      - "0x3e8"  # 1000
      - "0xf4240"  # 1000000

  # User secret/nullifier
  - name: "nullifier"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"

  # Merkle path (for privacy circuits)
  - name: "path_elements"
    type: "array"
    length: 20
    fuzz_strategy: random

  - name: "path_indices"
    type: "array"
    length: 20
    fuzz_strategy: random
    constraints:
      - "binary"

  # Timestamp (for time-sensitive operations)
  - name: "timestamp"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x63b0c100"  # Example timestamp
      - "0x64000000"
      - "0x65000000"

# =============================================================================
# DeFi-Specific Invariants
# =============================================================================

invariants:
  # Conservation of value
  - name: "conservation_of_value"
    description: "Total input value must equal output value plus fees"
    relation: "amount_in == amount_out + fee"
    severity: critical

  # Price bounds
  - name: "price_bounds"
    description: "Executed price must be within acceptable bounds"
    relation: "price >= min_price && price <= max_price"
    severity: high

  # Slippage protection
  - name: "slippage_limit"
    description: "Price impact must not exceed slippage tolerance"
    relation: "abs(executed_price - expected_price) <= max_slippage * expected_price"
    severity: high

  # Nullifier uniqueness
  - name: "nullifier_unique"
    description: "Each nullifier must be unique (no double-spend)"
    relation: "nullifier not in used_nullifiers"
    severity: critical

  # Merkle root validity
  - name: "merkle_root_valid"
    description: "Computed root must match on-chain root"
    relation: "computed_root == expected_root"
    severity: critical

  # Balance non-negative
  - name: "balance_nonnegative"
    description: "Account balances cannot go negative"
    relation: "balance >= 0"
    severity: critical

  # Fee bounds
  - name: "fee_bounds"
    description: "Fees must be within acceptable range"
    relation: "fee >= min_fee && fee <= max_fee"
    severity: medium

# =============================================================================
# Reporting Configuration
# =============================================================================

reporting:
  output_dir: "./reports/defi_audit"
  formats:
    - json
    - markdown
    - sarif
  include_poc: true
  crash_reproduction: true

# =============================================================================
# Oracle Configuration
# =============================================================================

oracles:
  - name: "nullifier_oracle"
    severity: critical
    description: "Detects nullifier collisions enabling double-spend"
    
  - name: "price_oracle"
    severity: high
    description: "Detects price manipulation through ordering"
    
  - name: "slippage_oracle"
    severity: high
    description: "Detects excessive slippage vulnerability"
    
  - name: "timing_oracle"
    severity: medium
    description: "Detects timing-based vulnerabilities"

# =============================================================================
# Mutations (DeFi-specific)
# =============================================================================

mutations:
  - name: "zero_amount"
    probability: 0.1
    operations:
      - "set_zero"
    description: "Test zero-amount edge cases"

  - name: "max_amount"
    probability: 0.1
    operations:
      - "set_max"
    description: "Test maximum value edge cases"

  - name: "price_extremes"
    probability: 0.1
    use_values:
      - "0x0"
      - "0x1"
      - "0xffffffff"
    description: "Test extreme price values"

  - name: "duplicate_nullifier"
    probability: 0.05
    operations:
      - "duplicate_input"
    description: "Test nullifier reuse"

  - name: "invalid_merkle"
    probability: 0.1
    operations:
      - "flip_bit"
      - "swap_siblings"
    description: "Test invalid Merkle paths"
