# Mode 3: Deepest Multi-Step Chain Fuzzing Template
# 
# This template defines multi-step event chains to find deep logic bugs
# that require specific sequences of operations to trigger.
#
# Usage:
#   cargo run --release -- evidence campaigns/templates/deepest_multistep.yaml \
#     --seed 42 --iterations 50000 --timeout 1800
#
# Documentation: docs/PLAN_MODE3_MULTISTEP.md

campaign:
  name: "Mode 3: Multi-Step Chain Audit"
  version: "1.0"
  target:
    framework: circom
    circuit_path: "./circuits/main.circom"
    main_component: "Main"

  parameters:
    field: "bn254"
    max_constraints: 100000
    timeout_seconds: 1800
    # NOTE: campaign.parameters is a flattened key/value map.
    # Do NOT nest under `additional:` (legacy templates used that shape).
    strict_backend: true
    evidence_mode: true
    # Mode 3 specific settings
    chain_budget_seconds: 600
    chain_iterations: 5000

# =============================================================================
# Chain Specifications (Mode 3)
# =============================================================================
# 
# Chains define sequences of circuit executions with input wiring
# between steps. Cross-step assertions catch bugs that span operations.

chains:
  # Example 1: Deposit-then-Withdraw chain
  # Tests that nullifiers are unique across deposit/withdraw operations
  - name: "deposit_then_withdraw"
    description: "Verify deposit and withdraw maintain invariants"
    steps:
      - circuit_ref: "deposit"
        input_wiring: fresh
        label: "Initial deposit"
      - circuit_ref: "withdraw"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [0, 2]   # deposit.out[0] (nullifier) → withdraw.in[2]
              - [1, 3]   # deposit.out[1] (root) → withdraw.in[3]
        label: "Withdrawal using deposit outputs"
    assertions:
      - name: "nullifier_uniqueness"
        relation: "unique(step[*].out[0])"
        severity: "critical"
        description: "Nullifiers must be unique across all steps"
      - name: "root_consistency"
        relation: "step[0].out[1] == step[1].in[3]"
        severity: "high"
        description: "Root from deposit must match withdraw input"

  # Example 2: Update-then-Verify chain
  # Tests Merkle root consistency across state updates
  - name: "update_then_verify"
    description: "Verify Merkle root propagation"
    steps:
      - circuit_ref: "update_root"
        input_wiring: fresh
        label: "Update Merkle tree"
      - circuit_ref: "verify_root"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [1, 0]   # update.out[1] (new_root) → verify.in[0] (root)
        label: "Verify updated root"
    assertions:
      - name: "root_propagation"
        relation: "step[0].out[1] == step[1].in[0]"
        severity: "high"
        description: "Updated root must be correctly passed to verification"
      - name: "verify_must_succeed"
        relation: "step[1].success == true"
        severity: "critical"
        description: "Verification must succeed for valid updates"

  # Example 3: Sign-then-Verify chain
  # Tests signature malleability (s vs p-s)
  - name: "sign_then_verify"
    description: "Test signature scheme consistency"
    steps:
      - circuit_ref: "sign"
        input_wiring: fresh
        label: "Create signature"
      - circuit_ref: "verify"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [0, 0]   # sign.out[0] (signature_r) → verify.in[0]
              - [1, 1]   # sign.out[1] (signature_s) → verify.in[1]
              - [2, 2]   # sign.out[2] (message) → verify.in[2]
        label: "Verify signature"
    assertions:
      - name: "signature_validity"
        relation: "step[1].success == true"
        severity: "critical"
        description: "Valid signatures must verify successfully"

  # Example 4: Double-spend attempt
  # Tests that the same nullifier cannot be used twice
  - name: "double_spend_attempt"
    description: "Attempt to use same nullifier twice"
    steps:
      - circuit_ref: "withdraw"
        input_wiring: fresh
        label: "First withdrawal"
      - circuit_ref: "withdraw"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [0, 0]   # Reuse same nullifier input
        label: "Second withdrawal with same nullifier"
    assertions:
      - name: "no_nullifier_reuse"
        relation: "unique(step[*].in[0])"
        severity: "critical"
        description: "Same nullifier should not work twice"

# =============================================================================
# Standard Invariants (for single-step checking)
# =============================================================================

invariants:
  - name: "range_check"
    invariant_type: range
    relation: "0 <= amount < 2^64"
    severity: "high"
    description: "Amount must be within valid range"

  - name: "nullifier_uniqueness"
    invariant_type: uniqueness
    relation: "unique(nullifier) for each (scope, secret)"
    severity: "critical"
    description: "Each nullifier must be unique"

# =============================================================================
# Attack Configuration
# =============================================================================

attacks:
  - type: underconstrained
    description: "Find multiple valid witnesses for same public inputs"
    config:
      witness_pairs: 5000
      public_input_count: 1

  - type: soundness
    description: "Attempt to create proofs for invalid statements"
    config:
      forge_attempts: 2000
      mutation_rate: 0.15

  - type: arithmetic_overflow
    description: "Test field arithmetic edge cases"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "p"
        - "2^64"
        - "2^128"

  - type: collision
    description: "Detect hash/output collisions"
    config:
      samples: 10000

# =============================================================================
# Input Definitions
# =============================================================================

inputs:
  - name: "nullifier"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"

  - name: "secret"
    type: "field"
    fuzz_strategy: random

  - name: "amount"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
      - "0xFFFFFFFFFFFFFFFF"  # 2^64 - 1

  - name: "path"
    type: "field[]"
    length: 32
    fuzz_strategy: random

  - name: "pathIndices"
    type: "field[]"
    length: 32
    fuzz_strategy: random
    constraints:
      - "binary"

# =============================================================================
# Reporting Configuration
# =============================================================================

reporting:
  output_dir: "./reports/mode3"
  formats:
    - json
    - markdown
  include_poc: true
  crash_reproduction: true

# =============================================================================
# Schedule (Optional - for phased execution)
# =============================================================================

schedule:
  - phase: "chain_seed"
    duration_sec: 120
    attacks: ["underconstrained"]
    early_terminate:
      on_critical_findings: 3

  - phase: "chain_deep"
    duration_sec: 600
    attacks: ["underconstrained", "collision"]
    carry_corpus: true

  - phase: "chain_edge"
    duration_sec: 300
    attacks: ["arithmetic_overflow", "soundness"]
    carry_corpus: true
