# Batch Verification Audit Campaign Template
# Phase 3.3: Batch Verification Bypass Detection
#
# This template is designed for auditing batch proof verification systems
# including aggregation schemes (Groth16, SnarkPack, Plonk, Halo2).
#
# Usage:
#   cargo run -- run campaigns/templates/batch_audit.yaml
#   cargo run -- evidence campaigns/templates/batch_audit.yaml --profile deep
#
# Customize the target section for your specific batch verifier circuit.
---

campaign:
  name: "batch_verification_audit"
  version: "1.0"
  target:
    # Replace with your batch verifier circuit
    framework: circom
    circuit_path: "./circuits/batch_verifier.circom"
    main_component: "BatchVerifier"
  parameters:
    field: "bn254"
    max_constraints: 1000000
    timeout_seconds: 1800

# ============================================================================
# Batch Verification Attacks
# ============================================================================

attacks:
  # Primary: Batch Mixing Bypass
  # Detects when invalid proofs pass verification when mixed with valid ones
  - type: batch_verification
    description: "Comprehensive batch verification bypass detection"
    config:
      # Test various batch sizes
      batch_sizes: [2, 4, 8, 16, 32]
      
      # Number of tests per attack type
      batch_mixing_tests: 500
      aggregation_forgery_tests: 1000
      cross_circuit_tests: 100
      randomness_reuse_tests: 500
      
      # Enable all detection methods
      detect_batch_mixing: true
      detect_aggregation_forgery: true
      detect_cross_circuit_batch: true
      detect_randomness_reuse: true
      
      # Aggregation methods to test
      aggregation_methods:
        - naive_batch
        - snarkpack
        - groth16_aggregation
        - plonk_aggregation
        - halo2_aggregation
      
      # Invalid proof positions to test
      invalid_positions:
        - first
        - last
        - middle
        - random
      
      # Correlation threshold for randomness reuse
      correlation_threshold: 0.8
      
      # Per-test timeout
      timeout_ms: 30000

  # Secondary: Aggregation-specific attacks
  - type: aggregation_forgery
    description: "Test aggregation scheme forgery vulnerabilities"
    config:
      aggregation_methods:
        - snarkpack
        - groth16_aggregation
        - plonk_aggregation
      forgery_attempts: 1000
      subset_sizes:
        - 1
        - 2
        - half
        - all_but_one

  # Ordering dependency detection
  - type: ordering_dependency
    description: "Check if proof ordering affects verification"
    config:
      permutation_tests: 100
      batch_sizes: [4, 8, 16]

# ============================================================================
# Input Specifications
# ============================================================================

inputs:
  # Batch of proofs
  - name: "proof_batch"
    type: "array[proof]"
    fuzz_strategy: mutation
    constraints:
      - "length >= 2"
      - "length <= 64"
    interesting:
      - "length == 2"
      - "length == power_of_2"
      - "length == 31"  # Non-power-of-2

  # Individual proof structure
  - name: "proof_element"
    type: "struct"
    fuzz_strategy: random
    constraints:
      - "valid_curve_point(A)"
      - "valid_curve_point(B)"
      - "valid_curve_point(C)"
    interesting:
      - "zero_proof"
      - "identity_elements"
      - "low_order_points"

  # Public inputs for each proof
  - name: "public_inputs"
    type: "array[field]"
    fuzz_strategy: guided_coverage
    constraints:
      - "length == expected_public_input_count"

# ============================================================================
# Mutations for Batch Testing
# ============================================================================

mutations:
  - name: "batch_corruption"
    probability: 0.3
    operations:
      - "replace_proof_at_index"
      - "duplicate_proof"
      - "remove_proof"
      - "insert_invalid_proof"
      - "swap_proofs"
    use_values:
      - "zero_proof"
      - "random_invalid_proof"
      - "negated_proof"

  - name: "aggregation_manipulation"
    probability: 0.2
    operations:
      - "partial_aggregate"
      - "subset_aggregate"
      - "reorder_aggregate"
    use_values:
      - "valid_subset"
      - "random_subset"

  - name: "randomness_correlation"
    probability: 0.1
    operations:
      - "reuse_randomness"
      - "correlated_randomness"
      - "zero_randomness"

# ============================================================================
# Oracles for Vulnerability Detection
# ============================================================================

oracles:
  - name: "batch_accepts_invalid"
    severity: critical
    description: "Batch verification passes but contains invalid individual proofs"

  - name: "aggregation_forged"
    severity: critical
    description: "Aggregated proof verifies but was not honestly constructed"

  - name: "cross_circuit_accepted"
    severity: critical
    description: "Proofs from different circuits accepted in same batch"

  - name: "randomness_leaked"
    severity: high
    description: "High correlation detected suggesting randomness reuse"

  - name: "ordering_affects_result"
    severity: medium
    description: "Proof ordering incorrectly affects verification result"

  - name: "subset_verifies"
    severity: critical
    description: "Subset of batch verifies as complete batch"

# ============================================================================
# Invariants for Evidence Mode
# ============================================================================

invariants:
  - name: "batch_soundness"
    relation: "batch_verify(proofs) => all(individual_verify(p) for p in proofs)"
    oracle: must_hold
    description: "Batch verification must imply individual proof validity"

  - name: "aggregation_binding"
    relation: "agg_verify(agg_proof, statements) => all(statement_valid(s) for s in statements)"
    oracle: must_hold
    description: "Aggregated proof must bind to all statements"

  - name: "batch_completeness"
    relation: "all(individual_verify(p) for p in proofs) => batch_verify(proofs)"
    oracle: should_hold
    description: "Valid individual proofs should verify in batch"

  - name: "order_independence"
    relation: "batch_verify(proofs) == batch_verify(permute(proofs))"
    oracle: must_hold
    description: "Batch verification should be order-independent"

  - name: "no_subset_forgery"
    relation: "batch_verify(subset(proofs)) => is_complete_batch(subset)"
    oracle: must_hold
    description: "Subsets should not verify as complete batches"

# ============================================================================
# Reporting Configuration
# ============================================================================

reporting:
  output_dir: "./reports/batch_verification"
  formats:
    - json
    - markdown
    - sarif
  include_poc: true
  crash_reproduction: true

# ============================================================================
# Schedule (for phased execution)
# ============================================================================

schedule:
  - phase: "quick_scan"
    duration_sec: 300
    attacks:
      - batch_verification
    config:
      batch_sizes: [2, 4, 8]
      batch_mixing_tests: 100
      aggregation_forgery_tests: 200

  - phase: "deep_scan"
    duration_sec: 1800
    attacks:
      - batch_verification
      - aggregation_forgery
      - ordering_dependency
    config:
      batch_sizes: [2, 4, 8, 16, 32, 64]
      batch_mixing_tests: 500
      aggregation_forgery_tests: 1000
      cross_circuit_tests: 200
      randomness_reuse_tests: 500

  - phase: "evidence"
    duration_sec: 3600
    attacks:
      - batch_verification
    config:
      evidence_mode: true
      strict_backend: true
      per_finding_verification: true
