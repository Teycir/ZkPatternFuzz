---
# Phase 4B: Template for Circom Evidence Campaigns
# Copy and customize for your circuit
#
# Usage:
#   cp campaigns/templates/circom_evidence.yaml campaigns/my_circuit.yaml
#   # Edit circuit_path, main_component, inputs, and invariants
#   zk-fuzzer evidence campaigns/my_circuit.yaml

campaign:
  name: "{{CIRCUIT_NAME}} Evidence Campaign"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "{{PATH_TO_CIRCUIT}}"
    main_component: "{{MAIN_COMPONENT}}"
  parameters:
    field: "bn254"
    max_constraints: 100000
    timeout_seconds: 1800
    # NOTE: campaign.parameters is a flattened key/value map.
    # Do NOT nest under `additional:` (legacy templates used that shape).

    # Backend settings - DO NOT CHANGE for evidence mode
    strict_backend: true
    mark_fallback: true
    per_exec_isolation: true
    execution_timeout_ms: 30000

    # Symbolic execution
    constraint_guided_enabled: true
    symbolic_max_paths: 1000
    symbolic_max_depth: 200
    symbolic_solver_timeout_ms: 5000

    # Corpus
    corpus_max_size: 100000

    # Oracles - customize based on circuit type
    enabled_oracles:
      - "underconstrained_oracle"
      - "constraint_inference_oracle"
      # Add these for specific circuit types:
      # - "nullifier_oracle"      # For privacy circuits
      # - "merkle_oracle"         # For Merkle tree circuits
      # - "range_oracle"          # For range proof circuits
      # - "commitment_oracle"     # For commitment schemes
    oracle_validation: true

    # Circom-specific
    circom_auto_setup_keys: true
    # circom_ptau_path: "./path/to/ptau"  # Optional: provide for proof generation
    include_paths: []  # Add node_modules paths if needed

    # Fuzzing
    fuzzing_iterations: 50000

invariants:
  # REQUIRED: Add at least one invariant for evidence mode
  # Examples:
  
  # Range invariant
  # - name: "input_in_range"
  #   invariant_type: range
  #   relation: "0 <= input < 2^64"
  #   oracle: must_hold
  #   severity: "high"
  #   description: "Input must fit in 64 bits"
  
  # Uniqueness invariant
  # - name: "output_unique"
  #   invariant_type: uniqueness
  #   relation: "unique(output) for each (input)"
  #   oracle: must_hold
  #   severity: "critical"
  #   description: "Different inputs must produce different outputs"
  
  # Constraint invariant
  # - name: "hash_correct"
  #   invariant_type: constraint
  #   relation: "output == Poseidon(input)"
  #   oracle: must_hold
  #   severity: "critical"
  #   description: "Output must equal hash of input"

  - name: "placeholder_invariant"
    invariant_type: constraint
    relation: "true"
    oracle: must_hold
    severity: "info"
    description: "Replace with real invariants"

attacks:
  - type: "soundness"
    description: "Attempt to create valid proofs for false statements"
    config:
      forge_attempts: 1000
      mutation_rate: 0.25

  - type: "underconstrained"
    description: "Find inputs that satisfy constraints but produce wrong outputs"
    config:
      witness_pairs: 5000

  - type: "boundary"
    description: "Test field arithmetic edge cases"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"

inputs:
  # REQUIRED: Define all circuit inputs
  # Example:
  # - name: "secret"
  #   type: "field"
  #   fuzz_strategy: random
  #
  # - name: "merkleProof"
  #   type: "array[field]"
  #   length: 20
  #   fuzz_strategy: random

  - name: "input"
    type: "field"
    fuzz_strategy: random

reporting:
  output_dir: "./reports/{{CIRCUIT_NAME}}"
  formats:
    - json
    - markdown
  include_poc: true
  crash_reproduction: true
