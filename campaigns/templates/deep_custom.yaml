---
# Phase 4B: Deep Custom Campaign Template
# Edge-case hunter for thorough analysis (~1 hour)
#
# Purpose: Find logic-based bugs that require deep exploration
# Use Case: After Quick Triage identifies promising areas
#
# Features:
# - Deep symbolic execution
# - Multi-step state transitions
# - Custom invariants for edge cases
# - Full oracle validation

campaign:
  name: "{{CIRCUIT_NAME}} Deep Custom Analysis"
  version: "2.0"
  target:
    framework: "{{FRAMEWORK}}"
    circuit_path: "{{PATH_TO_CIRCUIT}}"
    main_component: "{{MAIN_COMPONENT}}"
  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 3600  # 1 hour
    # NOTE: campaign.parameters is a flattened key/value map.
    # Do NOT nest under `additional:` (legacy templates used that shape).

    # Production settings
    strict_backend: true
    per_exec_isolation: true
    execution_timeout_ms: 60000  # 1 minute per execution

    # Deep symbolic execution
    constraint_guided_enabled: true
    symbolic_max_paths: 5000
    symbolic_max_depth: 500
    symbolic_solver_timeout_ms: 10000

    # Large corpus
    corpus_max_size: 500000

    # All relevant oracles
    enabled_oracles:
      - "underconstrained_oracle"
      - "arithmetic_overflow_oracle"
      - "nullifier_oracle"
      - "merkle_oracle"
      - "range_oracle"
      - "commitment_oracle"
      - "constraint_inference_oracle"
    oracle_validation: true
    oracle_validation_skip_stateful: false

    # Thorough fuzzing
    fuzzing_iterations: 200000

invariants:
  # Edge case invariants targeting bricking/unusual behavior
  
  - name: "all_zero_inputs"
    invariant_type: constraint
    relation: "circuit_accepts(all_zeros)"
    oracle: must_hold
    severity: "high"
    description: "Circuit should handle all-zero inputs gracefully"

  - name: "max_field_values"
    invariant_type: range
    relation: "inputs < p"
    oracle: must_hold
    severity: "critical"
    description: "All inputs must be valid field elements"

  # Add custom invariants for your circuit:
  # - Duplicated roots/nullifiers
  # - Non-binary path indices
  # - Malformed signature points
  # - etc.

attacks:
  - type: "soundness"
    description: "Thorough proof forgery testing"
    config:
      forge_attempts: 5000
      mutation_rate: 0.25

  - type: "underconstrained"
    description: "Deep underconstrained detection"
    config:
      witness_pairs: 20000
      tolerance: 0.0001

  - type: "boundary"
    description: "Comprehensive boundary testing"
    config:
      test_values:
        - "0"
        - "1"
        - "2"
        - "p-1"
        - "p-2"
        - "(p-1)/2"
        - "(p+1)/2"

  - type: "collision"
    description: "Thorough collision detection"
    config:
      samples: 50000

  - type: "constraint_inference"
    description: "Infer missing constraints"
    config:
      confidence_threshold: 0.8
      confirm_violations: true

  - type: "metamorphic"
    description: "Metamorphic relation testing"
    config:
      num_tests: 5000

inputs:
  # Define all inputs with comprehensive strategies
  - name: "input"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
      - "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"

reporting:
  output_dir: "./reports/deep_custom"
  formats:
    - json
    - markdown
  include_poc: true
  crash_reproduction: true
