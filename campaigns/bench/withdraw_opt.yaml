# Bench: Tornado Withdraw Optimized (Perf-First)
---
campaign:
  name: "bench_tornado_withdraw_opt"
  version: "2.0"
  target:
    framework: "circom"
    circuit_path: "/media/elements/Repos/zk0d/cat3_privacy/tornado-core/circuits/withdraw.circom"
    main_component: "Withdraw"

  parameters:
    field: "bn254"
    max_constraints: 200000
    timeout_seconds: 180
    max_iterations: 2000
    strict_backend: true
    oracle_validation: true
    build_dir_base: "./.zkfuzz_build"
    timeout_per_execution: 10
    circom_skip_compile_if_artifacts: true
    symbolic_enabled: false
    corpus_minimize_enabled: false
    corpus_max_size: 20000

attacks:
  - type: "underconstrained"
    description: "Baseline underconstrained pass"
    config:
      witness_pairs: 1
      public_input_names:
        - "root"
        - "nullifierHash"
        - "recipient"
        - "relayer"
        - "fee"
        - "refund"

  - type: "boundary"
    description: "Boundary testing for field inputs"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "(p-1)/2"

inputs:
  - name: "root"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "nullifierHash"
    type: "field"
    fuzz_strategy: "mutation"
    interesting:
      - "0x0"
      - "0x1"
      - "0xdeadbeef"

  - name: "recipient"
    type: "field"
    fuzz_strategy: "random"

  - name: "relayer"
    type: "field"
    fuzz_strategy: "random"

  - name: "fee"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

  - name: "refund"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0"
      - "1"

  - name: "nullifier"
    type: "field"
    fuzz_strategy: "random"

  - name: "secret"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "pathElements"
    type: "array<field>"
    length: 20
    fuzz_strategy: "mutation"

  - name: "pathIndices"
    type: "array<bool>"
    length: 20
    fuzz_strategy: "mutation"
    interesting:
      - "0"
      - "1"
      - "2"

mutations:
  - name: "bit_flip"
    probability: 0.25

  - name: "arithmetic"
    operations: ["add_one", "sub_one", "negate"]
    probability: 0.2

  - name: "havoc"
    probability: 0.1
    max_stacked_mutations: 3

reporting:
  output_dir: "./reports/bench/withdraw_opt"
  formats: ["json"]
  include_poc: false
  crash_reproduction: false

invariants:
  - name: "root_self_consistency"
    invariant_type: "constraint"
    relation: "root == root"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: root remains self-consistent"

  - name: "nullifier_hash_self_consistency"
    invariant_type: "constraint"
    relation: "nullifierHash == nullifierHash"
    oracle: "must_hold"
    severity: "low"
    description: "Sanity check: nullifierHash remains self-consistent"
