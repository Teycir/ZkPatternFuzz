[package]
name = "zk-fuzzer"
version = "0.1.0"
edition = "2021"
description = "Zero-Knowledge Proof Security Testing Framework"
license = "MIT"

[dependencies]
# Config & Serialization
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"

# ZK Backends
ark-ff = "0.4"
ark-bn254 = "0.4"
ark-relations = "0.4"
ark-snark = "0.4"

# Fuzzing infrastructure
arbitrary = { version = "1.3", features = ["derive"] }
proptest = "1.4"

# Async & Parallelism
tokio = { version = "1.35", features = ["full"] }
rayon = "1.8"

# CLI & Reporting
clap = { version = "4.4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
colored = "2.1"
indicatif = "0.17"

# Utilities
thiserror = "1.0"
anyhow = "1.0"
rand = "0.8"
hex = "0.4"
num-bigint = "0.4"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"
serde_json = "1.0"

[dev-dependencies]
tempfile = "3.10"

[[bin]]
name = "zk-fuzzer"
path = "src/main.rs"
