# Baseline Campaign for CI Regression Testing
# Deterministic configuration for reproducible results
#
# Usage:
#   cargo run --release -- --config tests/campaigns/baseline.yaml --seed 42 --workers 1
#
# Expected: Produces consistent output hash for regression testing
---
campaign:
  name: "Baseline Regression Test"
  version: "1.0"
  target:
    framework: "mock"
    circuit_path: "./circuits/mock_baseline.circom"
    main_component: "BaselineCircuit"

  parameters:
    field: "bn254"
    max_constraints: 10000
    timeout_seconds: 120
    # Fixed iteration count for determinism
    max_iterations: 1000

# Minimal attack set for fast, reproducible runs
attacks:
  - type: "underconstrained"
    description: "Baseline underconstrained detection"
    config:
      witness_pairs: 200

  - type: "boundary"
    description: "Baseline boundary testing"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"

  - type: "arithmetic_overflow"
    description: "Baseline arithmetic edge cases"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "(p-1)/2"

  - type: "collision"
    description: "Baseline collision detection"
    config:
      samples: 500

# Fixed input specifications
inputs:
  - name: "input_a"
    type: "field"
    constraints:
      - "nonzero"
    fuzz_strategy: "random"

  - name: "input_b"
    type: "field"
    fuzz_strategy: "interesting_values"
    interesting:
      - "0x0"
      - "0x1"
      - "0xffffffff"

  - name: "input_array"
    type: "array<field>"
    length: 4
    fuzz_strategy: "mutation"

# Deterministic mutation configuration
mutations:
  - name: "bit_flip"
    probability: 0.2

  - name: "arithmetic"
    operations: ["add_one", "sub_one", "negate"]
    probability: 0.2

  - name: "boundary"
    use_values: ["zero", "one", "max_field"]
    probability: 0.2

# Standard oracles
oracles:
  - name: "different_witness_same_output"
    severity: "critical"
    description: "Underconstrained detection oracle"

  - name: "boundary_violation"
    severity: "high"
    description: "Boundary value violation"

  - name: "arithmetic_overflow"
    severity: "high"
    description: "Field arithmetic overflow"

# Reporting configuration
reporting:
  output_dir: "./reports/baseline"
  formats: ["json", "markdown"]
  include_poc: true
  crash_reproduction: true
