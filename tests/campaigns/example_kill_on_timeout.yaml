campaign:
  name: "Example: Kill on Timeout Configuration"
  version: "1.0"
  target:
    framework: "mock"
    circuit_path: "./circuits/mock_merkle.circom"
    main_component: "MockMerkle"
  parameters:
    field: "bn254"
    max_constraints: 100000
    timeout_seconds: 300
    additional:
      # Enable per-execution isolation for hang safety
      per_exec_isolation: true
      # Set execution timeout to 30 seconds
      execution_timeout_ms: 30000
      # Control whether to kill the process on timeout
      # Set to false to let the process continue (not recommended for production)
      # Set to true (default) to kill the process on timeout
      kill_on_timeout: false  # Example: don't kill on timeout

attacks:
  - type: "boundary"
    description: "Test boundary values"
    config:
      test_values: ["0", "1", "p-1"]

inputs:
  - name: "leaf"
    type: "field"
    fuzz_strategy: "random"
  - name: "pathIndices"
    type: "field"
    fuzz_strategy: "random"

reporting:
  output_dir: "./reports"
  formats: ["json", "markdown"]
