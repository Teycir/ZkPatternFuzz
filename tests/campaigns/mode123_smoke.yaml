campaign:
  name: "Mode 2/3 Smoke Non-Regression"
  version: "1.0"
  target:
    framework: "circom"
    circuit_path: "./tests/ground_truth/chains/mode123_smoke/mode123_main.circom"
    main_component: "Mode123Main"
  parameters:
    field: "bn254"
    max_constraints: 2048
    timeout_seconds: 30
    strict_backend: true
    symbolic_enabled: false
    constraint_guided_enabled: false
    max_iterations: 8
    fuzzing_iterations: 8
    fuzzing_timeout_seconds: 3
    evidence_allow_no_isolation: true
    per_exec_isolation: false
    chain_budget_seconds: 3
    chain_iterations: 6
    chain_step_timeout_ms: 1500
    engagement_min_chain_unique_coverage_bits: 1

attacks: []

inputs:
  - name: "a"
    type: "field"
    fuzz_strategy: "random"
  - name: "b"
    type: "field"
    fuzz_strategy: "random"

invariants:
  - name: "a_small_range"
    invariant_type: "range"
    relation: "0 <= a < 16"
    severity: "medium"

chains:
  - name: "mode123_smoke_chain"
    description: "Simple two-step chain for Mode 3 smoke regression"
    circuits:
      chain_step0:
        path: "./tests/ground_truth/chains/mode123_smoke/mode123_chain_step0.circom"
        main_component: "Mode123ChainStep0"
      chain_step1:
        path: "./tests/ground_truth/chains/mode123_smoke/mode123_chain_step1.circom"
        main_component: "Mode123ChainStep1"
    steps:
      - circuit_ref: "chain_step0"
        input_wiring: "fresh"
        label: "Produce (a+b, b)"
      - circuit_ref: "chain_step1"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [0, 0]
              - [1, 1]
        label: "Consume prior outputs"
    assertions:
      - name: "sum_wired_forward"
        relation: "step[0].out[0] == step[1].in[0]"
        severity: "high"
      - name: "second_step_success"
        relation: "step[1].success == true"
        severity: "high"

reporting:
  output_dir: "./reports/mode123_smoke"
  formats: ["json"]
