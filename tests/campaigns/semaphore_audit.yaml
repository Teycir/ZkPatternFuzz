# Real-world ZK Fuzzing Campaign: Semaphore
# Target: Privacy-preserving identity protocol
# Source: /media/elements/Repos/zk0d/cat3_privacy/semaphore

campaign:
  name: "Semaphore Protocol Security Audit"
  version: "1.0"
  description: |
    Semaphore is a zero-knowledge protocol for anonymous signaling.
    This campaign tests for common vulnerabilities in identity and
    nullifier circuits.
  target:
    framework: circom
    circuit_path: "/media/elements/Repos/zk0d/cat3_privacy/semaphore/packages/circuits/src/semaphore.circom"
    main_component: "Semaphore"
  
  parameters:
    field: "bn254"
    max_constraints: 50000
    timeout_seconds: 600

attacks:
  # Critical: Test for identity collision attacks
  - type: underconstrained
    description: "Detect if different identity commitments can produce valid proofs"
    config:
      witness_pairs: 5000
      compare_outputs: true
      focus_signals:
        - "identityCommitment"
        - "nullifierHash"

  # Critical: Nullifier uniqueness attack
  - type: collision
    description: "Test nullifier hash uniqueness - critical for double-spending prevention"
    config:
      samples: 20000
      target_outputs:
        - "nullifierHash"
  
  # High: Merkle tree proof soundness
  - type: soundness
    description: "Attempt to forge invalid merkle proofs"
    config:
      forge_attempts: 2000
      mutation_rate: 0.15
      focus_inputs:
        - "treeSiblings"
        - "treePathIndices"

  # Medium: Field boundary testing
  - type: arithmetic_overflow
    description: "Test field arithmetic edge cases in Poseidon hash"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"
        - "p"
        - "(p-1)/2"
        - "2^254"

  # Medium: Boundary value testing
  - type: boundary
    description: "Test tree depth and index boundaries"
    config:
      test_values:
        - "0"
        - "1"
        - "max_depth"
        - "2^tree_depth - 1"

inputs:
  - name: "secret"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"
    description: "User's secret key for identity"

  - name: "identityNullifier"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"
    description: "Random nullifier for anonymity"

  - name: "identityTrapdoor"
    type: "field"
    fuzz_strategy: mutation
    constraints:
      - "nonzero"
    description: "Trapdoor for identity commitment"

  - name: "treePathIndices"
    type: "array[20]"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
    description: "Binary path in merkle tree (0 or 1)"

  - name: "treeSiblings"
    type: "array[20]"
    fuzz_strategy: random
    description: "Merkle tree sibling hashes"

  - name: "signalHash"
    type: "field"
    fuzz_strategy: random
    description: "Hash of signal being broadcast"

  - name: "externalNullifier"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
      - "0xdead"
      - "0xffffffff"
    description: "External nullifier to prevent front-running"

reporting:
  output_dir: "./reports/semaphore"
  formats:
    - json
    - markdown
  include_poc: true
  crash_reproduction: true
  severity_threshold: low
