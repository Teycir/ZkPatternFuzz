campaign:
  name: "Validation: 0xPARC Tornado Nullifier"
  version: "1.0"
  target:
    framework: "circom"
    circuit_path: "tests/bench/known_bugs/nullifier_collision/circuit.circom"
    main_component: "main"
  parameters:
    timeout_seconds: 120
    additional:
      strict_backend: true
      evidence_mode: true

attacks:
  - type: underconstrained
    config:
      witness_pairs: 5000
      public_input_names: ["nullifier"]

inputs:
  - name: nullifier
    type: field
    fuzz_strategy: random

reporting:
  output_dir: "reports/validation/0xparc/tornado_nullifier"
  formats: ["json", "markdown"]
  include_poc: true
