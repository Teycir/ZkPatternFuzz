campaign:
  name: "Validation: Safe Circuits Benchmark"
  version: "1.0"
  target:
    framework: "circom"
    circuit_path: "tests/safe_circuits/merkle_tree_secure.circom"
    main_component: "main"
  parameters:
    timeout_seconds: 120
    additional:
      strict_backend: true
      evidence_mode: true

attacks:
  - type: underconstrained
    config:
      witness_pairs: 5000
  - type: soundness
    config:
      forge_attempts: 2000
  - type: arithmetic_overflow
  - type: collision
  - type: boundary

inputs:
  - name: root
    type: field
    fuzz_strategy: random

reporting:
  output_dir: "reports/validation/safe"
  formats: ["json", "markdown"]
  include_poc: true
