campaign:
  name: "Validation: CVE Suite"
  version: "1.0"
  target:
    framework: "circom"
    circuit_path: "tests/bench/known_bugs/underconstrained_merkle/circuit.circom"
    main_component: "main"
  parameters:
    timeout_seconds: 120
    additional:
      strict_backend: true
      evidence_mode: true
      min_evidence_confidence: "high"

attacks:
  - type: underconstrained
    config:
      witness_pairs: 5000
  - type: soundness
    config:
      forge_attempts: 1500
  - type: arithmetic_overflow
  - type: collision
  - type: boundary

inputs:
  - name: root
    type: field
    fuzz_strategy: random

reporting:
  output_dir: "reports/validation/cve"
  formats: ["json", "markdown"]
  include_poc: true
