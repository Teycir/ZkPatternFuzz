# Real-world ZK Fuzzing Campaign: Polygon zkEVM Circuits
# Target: ZK rollup circuit infrastructure
# Source: /media/elements/Repos/zk0d/cat2_rollups/zkevm-circuits

campaign:
  name: "Polygon zkEVM Circuit Security Audit"
  version: "1.0"
  description: |
    Polygon zkEVM uses ZK proofs to validate Ethereum state transitions.
    This campaign tests the core circuit logic for EVM opcode execution
    and state transition validity.
  target:
    framework: halo2
    circuit_path: "./circuits/zkevm-circuits"
    main_component: "SuperCircuit"
  
  parameters:
    field: "bn254"
    max_constraints: 1000000
    timeout_seconds: 1800
    parallelism: 8

attacks:
  # Critical: State transition soundness
  - type: soundness
    description: "Verify EVM state transitions cannot be forged"
    config:
      forge_attempts: 10000
      mutation_rate: 0.1
      focus_areas:
        - "state_root"
        - "receipt_root"
        - "tx_hash"

  # Critical: Opcode constraint verification
  - type: underconstrained
    description: "Check each EVM opcode is properly constrained"
    config:
      witness_pairs: 20000
      opcodes_to_test:
        - "ADD"
        - "SUB"
        - "MUL"
        - "DIV"
        - "SSTORE"
        - "SLOAD"
        - "CALL"
        - "DELEGATECALL"

  # High: Arithmetic overflow in EVM operations
  - type: arithmetic_overflow
    description: "Test 256-bit arithmetic edge cases in EVM circuits"
    config:
      test_values:
        - "0"
        - "1"
        - "2^255"
        - "2^256-1"
        - "p-1"
        - "p"
      focus_operations:
        - "add"
        - "mul"
        - "exp"
        - "mod"

  # High: Memory and storage constraints
  - type: boundary
    description: "Test memory/storage access boundaries"
    config:
      test_values:
        - "0"
        - "32"
        - "2^24"  # Max memory offset typically
        - "2^32-1"

  # Medium: Cross-circuit data flow
  - type: collision
    description: "Check for data collision between circuit components"
    config:
      samples: 30000
      cross_check_circuits:
        - "tx_circuit"
        - "state_circuit"
        - "bytecode_circuit"

inputs:
  - name: "block_number"
    type: "field"
    fuzz_strategy: random
    description: "Block number being proved"

  - name: "prev_state_root"
    type: "field"
    fuzz_strategy: random
    description: "Previous state root"

  - name: "post_state_root"
    type: "field"
    fuzz_strategy: random
    description: "Post-execution state root"

  - name: "transactions"
    type: "array[variable]"
    fuzz_strategy: mutation
    description: "Encoded transactions in block"

  - name: "witness_data"
    type: "bytes"
    fuzz_strategy: mutation
    description: "EVM execution witness"

reporting:
  output_dir: "./reports/zkevm"
  formats:
    - json
    - markdown
    - sarif
  include_poc: true
  crash_reproduction: true
  severity_threshold: medium
