campaign:
  name: "Fixture Merkle Audit"
  version: "1.0"
  target:
    framework: "circom"
    circuit_path: "./circuits/fixture_merkle.circom"
    main_component: "MerkleProof"
  parameters:
    field: "bn254"
    max_constraints: 5000
    timeout_seconds: 20
    additional:
      max_iterations: 200

attacks:
  - type: "underconstrained"
    description: "Detect underconstrained behavior"
    config:
      witness_pairs: 25

  - type: "collision"
    description: "Detect output collisions"
    config:
      samples: 200

  - type: "boundary"
    description: "Boundary value testing"
    config:
      test_values:
        - "0"
        - "1"
        - "p-1"

inputs:
  - name: "root"
    type: "field"
    fuzz_strategy: "random"
  - name: "leaf"
    type: "field"
    fuzz_strategy: "random"
  - name: "pathElements"
    type: "array<field>"
    length: 10
    fuzz_strategy: "random"
  - name: "pathIndices"
    type: "array<field>"
    length: 10
    fuzz_strategy: "random"

reporting:
  output_dir: "./reports/fixture_merkle"
  formats: ["json"]
