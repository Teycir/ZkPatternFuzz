# Mock Nullifier Circuit Test Campaign
# Tests nullifier generation for collision and determinism properties
---
campaign:
  name: "Mock Nullifier Security Test"
  version: "1.0"
  target:
    framework: "mock"
    circuit_path: "./circuits/mock_nullifier.circom"
    main_component: "Nullifier"

  parameters:
    field: "bn254"
    max_constraints: 50000
    timeout_seconds: 120

attacks:
  - type: "collision"
    description: "Find different preimages producing same nullifier"
    config:
      samples: 5000

  - type: "underconstrained"
    description: "Check if nullifier computation is fully constrained"
    config:
      witness_pairs: 1000
      compare_outputs: true

  - type: "boundary"
    description: "Test boundary values for nullifier inputs"
    config:
      test_values:
        - "0"
        - "max-1"
        - "max"
        - "max+1"
        - "-1"
        - "field_mod-1"

inputs:
  - name: "secret"
    type: "field"
    fuzz_strategy: "random"
    constraints:
      - "nonzero"

  - name: "nonce"
    type: "field"
    fuzz_strategy: "mutation"
    interesting:
      - "0x0"
      - "0x1"
      - "0xffffffff"

mutations:
  - name: "bit_flip"
    probability: 0.25

  - name: "arithmetic"
    operations: ["add_one", "sub_one"]
    probability: 0.25

  - name: "havoc"
    probability: 0.15
    max_stacked_mutations: 3

oracles:
  - name: "nullifier_collision"
    severity: "critical"
    description: "Different secrets produce the same nullifier"

  - name: "determinism"
    severity: "high"
    description: "Same inputs must always produce same nullifier"

reporting:
  output_dir: "./reports/nullifier_test"
  formats: ["json", "markdown", "sarif"]
  include_poc: true
  crash_reproduction: true
