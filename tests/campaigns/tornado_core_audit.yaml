# Real-world ZK Fuzzing Campaign: Tornado Cash Core
# Target: Privacy-preserving mixer protocol
# Source: ${ZK0D_BASE:-/media/elements/Repos/zk0d}/cat3_privacy/tornado-core

campaign:
  name: "Tornado Cash Core Security Audit"
  version: "1.0"
  description: |
    Tornado Cash is a non-custodial mixer for Ethereum.
    This campaign focuses on the core withdraw circuit which
    proves knowledge of a commitment in a merkle tree.
  target:
    framework: circom
    circuit_path: "./circuits/withdraw.circom"
    main_component: "Withdraw"
  
  parameters:
    field: "bn254"
    max_constraints: 100000
    timeout_seconds: 900

attacks:
  # Critical: Double-spend prevention
  - type: underconstrained
    description: "Detect if same nullifier can be generated from different notes"
    config:
      witness_pairs: 50
      critical_signals:
        - "nullifierHash"

  # Critical: Note forgery
  - type: soundness
    description: "Attempt to forge proofs for non-existent commitments"
    config:
      forge_attempts: 5000
      mutation_rate: 0.2
      mutation_targets:
        - "root"
        - "pathElements"

  # Critical: Hash collision in commitments
  - type: collision
    description: "Search for commitment hash collisions (MiMC/Poseidon)"
    config:
      samples: 50000
      hash_function: "MiMC"

  # High: Merkle root manipulation
  - type: arithmetic_overflow
    description: "Test arithmetic edge cases that might bypass merkle verification"
    config:
      test_values:
        - "0"
        - "1"  
        - "p-1"
        - "p"
        - "2^253"
        - "2^254"

  # Medium: Path length validation
  - type: boundary
    description: "Test merkle tree depth boundaries"
    config:
      test_values:
        - "0"
        - "1"
        - "19"  # Typical tree depth
        - "20"
        - "21"
        - "1048576"  # 2^20

inputs:
  - name: "root"
    type: "field"
    fuzz_strategy: random
    description: "Merkle tree root"

  - name: "nullifierHash"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "unique"
    description: "Hash that proves note consumption"

  - name: "recipient"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
      - "0xdead"
    description: "Recipient address"

  - name: "relayer"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
    description: "Relayer address"

  - name: "fee"
    type: "field"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
      - "0xffffffff"
    description: "Relayer fee"

  - name: "refund"
    type: "field"
    fuzz_strategy: random
    description: "Refund amount"

  - name: "nullifier"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"
    description: "Secret nullifier"

  - name: "secret"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"
    description: "Secret key for commitment"

  - name: "pathElements"
    type: "array[20]"
    fuzz_strategy: random
    description: "Merkle proof path elements"

  - name: "pathIndices"
    type: "array[20]"
    fuzz_strategy: interesting_values
    interesting:
      - "0x0"
      - "0x1"
    description: "Merkle proof path indices (binary)"

reporting:
  output_dir: "./reports/tornado"
  formats:
    - json
    - markdown
    - sarif
  include_poc: true
  crash_reproduction: true
  severity_threshold: low
