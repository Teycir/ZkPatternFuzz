invariants:
  - name: a_small_range
    invariant_type: range
    relation: "0 <= a < 16"
    severity: medium

attacks:
  - type: underconstrained
    description: Minimal underconstrained smoke check
    config:
      witness_pairs: 8
      public_input_count: 1
  - type: soundness
    description: Minimal soundness smoke check
    config:
      forge_attempts: 10
      mutation_rate: 0.1
  - type: boundary
    description: Minimal boundary smoke check
    config:
      test_values:
        - "0"
        - "1"
        - "2"
  - type: constraint_inference
    description: Minimal constraint inference smoke check
    config:
      confidence_threshold: 0.7
  - type: metamorphic
    description: Minimal metamorphic smoke check
    config:
      num_tests: 10
  - type: constraint_slice
    description: Minimal constraint slice smoke check
    config:
      samples_per_cone: 10
      base_witness_attempts: 3
  - type: spec_inference
    description: Minimal spec inference smoke check
    config:
      num_tests: 10
  - type: witness_collision
    description: Minimal witness collision smoke check
    config:
      samples: 10

inputs:
  - name: a
    type: field
    fuzz_strategy: random
  - name: b
    type: field
    fuzz_strategy: random
