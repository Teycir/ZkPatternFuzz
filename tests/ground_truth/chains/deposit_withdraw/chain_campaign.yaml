# Ground Truth: Deposit-then-Withdraw Chain
# Expected: CONFIRMED - nullifier_uniqueness assertion should be violated
# Bug Class: Nullifier reuse across steps

campaign:
  name: "Ground Truth: Deposit-Withdraw Chain"
  version: "1.0"
  target:
    framework: circom
    circuit_path: "./tests/ground_truth/chains/deposit_withdraw/deposit.circom"
    main_component: "Deposit"

  parameters:
    field: "bn254"
    max_constraints: 10000
    timeout_seconds: 60

chains:
  - name: "deposit_then_withdraw_buggy"
    description: "Deposit and withdraw with nullifier reuse vulnerability"
    circuits:
      deposit:
        path: "./tests/ground_truth/chains/deposit_withdraw/deposit.circom"
        main_component: "Deposit"
      withdraw:
        path: "./tests/ground_truth/chains/deposit_withdraw/withdraw.circom"
        main_component: "Withdraw"
    steps:
      - circuit_ref: "deposit"
        input_wiring: fresh
        label: "Make deposit"
      - circuit_ref: "withdraw"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [0, 2]   # deposit.nullifier → withdraw.nullifierIn
              - [2, 3]   # deposit.newRoot → withdraw.root
        label: "Withdraw using deposit outputs"
    assertions:
      - name: "nullifier_uniqueness"
        relation: "unique(step[*].out[0])"
        severity: "critical"
        description: "Nullifiers must be unique across deposit/withdraw"

inputs:
  - name: "secret"
    type: "field"
    fuzz_strategy: random
  - name: "amount"
    type: "field"
    fuzz_strategy: random
  - name: "nonce"
    type: "field"
    fuzz_strategy: random

reporting:
  output_dir: "./reports/ground_truth/deposit_withdraw"
  formats:
    - json
