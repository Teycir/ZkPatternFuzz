# Ground Truth: Clean Deposit-Withdraw Chain
# Expected: CLEAN - no findings (true negative)
# This tests that the fuzzer does NOT produce false positives

campaign:
  name: "Ground Truth: Clean Deposit-Withdraw Chain"
  version: "1.0"
  target:
    framework: circom
    circuit_path: "./tests/ground_truth/chains/clean_deposit_withdraw/"
    main_component: "CleanDeposit"

  parameters:
    field: "bn254"
    max_constraints: 10000
    timeout_seconds: 60

chains:
  - name: "clean_deposit_withdraw"
    description: "Correctly implemented deposit and withdraw"
    steps:
      - circuit_ref: "clean_deposit"
        input_wiring: fresh
        label: "Make deposit"
      - circuit_ref: "clean_withdraw"
        input_wiring:
          from_prior_output:
            step: 0
            mapping:
              - [0, 2]   # deposit.nullifier → withdraw.nullifierIn
              - [2, 3]   # deposit.newRoot → withdraw.root
        label: "Withdraw using deposit outputs"
    assertions:
      - name: "nullifier_uniqueness"
        relation: "unique(step[*].out[0])"
        severity: "critical"
        description: "Nullifiers must be unique"
      - name: "amount_preservation"
        relation: "step[1].out[2] > 0"
        severity: "high"
        description: "Amount must be positive"

inputs:
  - name: "secret"
    type: "field"
    fuzz_strategy: random
  - name: "amount"
    type: "field"
    fuzz_strategy: random
    constraints:
      - "nonzero"
  - name: "nonce"
    type: "field"
    fuzz_strategy: random

reporting:
  output_dir: "./reports/ground_truth/clean_deposit_withdraw"
  formats:
    - json
